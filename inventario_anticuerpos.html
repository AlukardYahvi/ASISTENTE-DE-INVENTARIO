<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Especializado: Oligos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import * as LucideIcons from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

    const { Search, Plus, Settings, Trash2, ArrowLeft, Image: ImageIcon, ExternalLink, ShieldAlert, AlignLeft, X, Printer } = LucideIcons;

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDeaQnmO8nRG4stRrbnmONaz_k1EUWqVHc",
      authDomain: "asistente-de-inventario.firebaseapp.com",
      projectId: "asistente-de-inventario",
      storageBucket: "asistente-de-inventario.firebasestorage.app",
      messagingSenderId: "972615078649",
      appId: "1:972615078649:web:a803b9bd801a2481688828"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'lab-manager-yahvi';

    const SUPER_ADMIN_EMAILS = [
      'yahvi.edsel.hernandez@gmail.com',
      'asistentelicam@gmail.com',
      'nnajerag@ipn.mx'
    ];

    function OligosApp() {
      const [currentUser, setCurrentUser] = useState(null);
      const [oligos, setOligos] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [showForm, setShowForm] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            }
          } catch (err) { console.error(err); }
        };
        initAuth();

        const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
          if (user) {
            setCurrentUser({ uid: user.uid, email: user.email, isSuperAdmin: user.email ? SUPER_ADMIN_EMAILS.includes(user.email) : false });
          } else { 
            setCurrentUser(null);
            setLoading(false);
          }
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!currentUser) return;

        const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inv_oligos');
        const unsubInv = onSnapshot(invRef, 
          (snapshot) => {
            setOligos(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setLoading(false);
          },
          (error) => {
            console.error("Error al escuchar cambios: ", error);
            setLoading(false);
          }
        );

        return () => unsubInv();
      }, [currentUser]);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 400; let w = img.width; let h = img.height;
            if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            setImagePreview(canvas.toDataURL('image/jpeg', 0.6));
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      };

      const handleSave = async (e) => {
        e.preventDefault();
        if (!currentUser || !currentUser.isSuperAdmin) return alert("Solo los administradores autorizados pueden añadir elementos.");
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.qty = Number(data.qty);
        data.imageUrl = imagePreview || editingItem?.imageUrl || '';

        // Generar un ID numérico estilo catálogo si no lo tiene
        if (!data.barcode) {
            data.barcode = `LAB-${Date.now().toString(36).toUpperCase()}`;
        }

        const docId = editingItem ? editingItem.id : `oligo_${Date.now()}`;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inv_oligos', docId), data, { merge: true });
          setShowForm(false); setEditingItem(null); setImagePreview(null);
        } catch (err) { alert("Error al guardar: " + err.message); }
      };

      const handleDelete = async (id) => {
        if (!currentUser?.isSuperAdmin) return;
        if (window.confirm("¿Seguro que deseas eliminar este oligo permanentemente?")) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inv_oligos', id));
        }
      };

      const handlePrintAllLabels = () => {
        const printWindow = window.open('', '_blank');
        if (oligos.length === 0) return alert("No hay elementos para imprimir.");

        let labelsHtml = oligos.map(item => {
          const code = item.barcode || item.id;
          const name = item.name;
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(code)}`;
          const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(code)}&scaleX=2&scaleY=1&includetext=true`;
          
          return `
            <div class="label-box">
              <div class="title">${name}</div>
              <div class="codes">
                 <img src="${qrUrl}" alt="QR" class="qr" />
                 <img src="${barcodeUrl}" alt="Barcode" class="barcode" />
              </div>
              <div class="meta"><strong>Lote:</strong> ${item.lotNum || '--'} | <strong>Cat:</strong> ${item.catalogNum || '--'}</div>
            </div>
          `;
        }).join('');

        printWindow.document.write(`
          <html><head><title>Catálogo General de Etiquetas</title><style>
            body { font-family: sans-serif; margin: 0; padding: 20px; background: #fff;}
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(7cm, 1fr)); gap: 15px; }
            .label-box { border: 1px dashed #666; padding: 10px; display: flex; flex-direction: column; align-items: center; text-align: center; border-radius: 4px;}
            .title { font-size: 12px; font-weight: bold; margin-bottom: 8px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .codes { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%;}
            .qr { width: 50px; height: 50px; }
            .barcode { height: 40px; max-width: 120px; object-fit: contain; }
            .meta { font-size: 10px; color: #333; margin-top: 8px; border-top: 1px solid #eee; padding-top: 4px; width: 100%;}
            @media print { 
              body { padding: 0; } 
              .label-box { page-break-inside: avoid; border: 1px solid #000; }
            }
          </style></head><body>
            <h2 style="text-align:center; margin-bottom: 20px;">Catálogo General de Etiquetas de Oligos</h2>
            <div class="grid">${labelsHtml}</div>
            <script>
              setTimeout(() => { window.print(); }, 2000); 
            <\/script>
          </body></html>
        `);
        printWindow.document.close();
      };

      if (loading) return <div className="h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600"></div></div>;

      if (!currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
              <ShieldAlert className="mx-auto text-orange-500 mb-4" size={48} />
              <h2 className="text-xl font-bold mb-2">Acceso Restringido</h2>
              <p className="text-gray-600 mb-6">Debes iniciar sesión en la aplicación principal (LabManager) para acceder a este módulo.</p>
              <a href="index.html" className="block w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Ir a LabManager</a>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
          {/* Cabecera */}
          <div className="bg-white rounded-3xl shadow-sm border border-emerald-100 p-6 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div className="flex items-center gap-4">
              <div className="bg-emerald-100 text-emerald-700 p-3 rounded-2xl"><AlignLeft size={32} /></div>
              <div>
                <h1 className="text-2xl font-black text-gray-900">Catálogo de Oligos</h1>
                <p className="text-sm text-gray-500">Módulo Especializado LabManager</p>
              </div>
            </div>
            <div className="flex items-center gap-3 w-full sm:w-auto">
              {currentUser.isSuperAdmin && (
                <button onClick={handlePrintAllLabels} className="px-4 py-2 bg-slate-800 text-white rounded-xl hover:bg-slate-900 font-bold flex items-center gap-2 shadow-md">
                  <Printer size={18}/> Etiquetas
                </button>
              )}
              <a href="index.html" className="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 font-bold flex items-center gap-2"><ArrowLeft size={18}/> Volver</a>
              {currentUser.isSuperAdmin && (
                <button onClick={() => {setEditingItem(null); setImagePreview(null); setShowForm(true);}} className="flex-1 sm:flex-none px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-md">
                  + Registrar
                </button>
              )}
            </div>
          </div>

          {/* Formulario */}
          {showForm && currentUser.isSuperAdmin && (
            <div className="bg-white p-6 rounded-3xl shadow-lg border border-emerald-200 mb-8 animate-fade-in relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-black text-gray-800">{editingItem ? 'Editar Oligo' : 'Nuevo Oligo'}</h2>
                <button onClick={() => {setShowForm(false); setImagePreview(null); setEditingItem(null);}} className="p-2 hover:bg-gray-100 rounded-full"><X size={20}/></button>
              </div>
              <form onSubmit={handleSave} className="space-y-4">
                <div className="flex flex-col sm:flex-row gap-6">
                  {/* Imagen */}
                  <div className="w-full sm:w-1/3 space-y-2">
                    <label className="block text-xs font-bold text-gray-500 uppercase">Foto (Opcional)</label>
                    <div className="h-40 w-full bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center overflow-hidden relative">
                      {imagePreview ? <img src={imagePreview} className="object-cover w-full h-full" /> : <ImageIcon className="text-gray-300" size={32}/>}
                      <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </div>
                  </div>
                  {/* Datos Principales */}
                  <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="sm:col-span-2">
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Secuencia / Nombre *</label>
                      <input name="name" defaultValue={editingItem?.name} required className="w-full p-3 border rounded-lg focus:border-emerald-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Marca / Sintetizador *</label>
                      <input name="brand" defaultValue={editingItem?.brand} required className="w-full p-3 border rounded-lg focus:border-emerald-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nº de Catálogo</label>
                      <input name="catalogNum" defaultValue={editingItem?.catalogNum} className="w-full p-3 border rounded-lg focus:border-emerald-500 outline-none font-mono" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nº de Lote</label>
                      <input name="lotNum" defaultValue={editingItem?.lotNum} className="w-full p-3 border rounded-lg focus:border-emerald-500 outline-none font-mono" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-orange-500 uppercase mb-1">Caducidad</label>
                      <input type="date" name="expirationDate" defaultValue={editingItem?.expirationDate} className="w-full p-3 border rounded-lg focus:border-emerald-500 outline-none" />
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Cantidad *</label>
                      <input type="number" name="qty" defaultValue={editingItem?.qty || 1} required className="w-full p-3 border rounded-lg text-center font-bold" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Unidad (ej. nmoles) *</label>
                      <input name="unit" defaultValue={editingItem?.unit || 'nmoles'} required className="w-full p-3 border rounded-lg text-center" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-blue-500 uppercase mb-1">Enlace de Pedido</label>
                    <input name="purchaseLink" defaultValue={editingItem?.purchaseLink} type="url" placeholder="https://..." className="w-full p-3 border rounded-lg outline-none" />
                  </div>
                </div>

                <button type="submit" className="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl mt-4 hover:bg-emerald-700 shadow-md">Guardar Oligo</button>
              </form>
            </div>
          )}

          {/* Lista de Oligos */}
          <div className="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
            <div className="p-4 border-b border-gray-100 bg-gray-50">
               <div className="flex items-center gap-2 bg-white p-2 rounded-xl border">
                 <Search className="text-gray-400 mx-2" size={20} />
                 <input type="text" placeholder="Buscar oligo por secuencia, catálogo..." className="w-full outline-none font-medium" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
               </div>
            </div>
            
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-6 bg-slate-50/50">
              {oligos.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()) || i.catalogNum?.includes(searchQuery) || i.brand?.toLowerCase().includes(searchQuery.toLowerCase())).map(item => (
                <div key={item.id} className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col hover:border-emerald-300 transition-colors">
                  <div className="h-32 bg-gray-100 relative flex items-center justify-center border-b border-gray-100 p-2">
                    {item.imageUrl ? <img src={item.imageUrl} className="h-full object-contain" /> : <ImageIcon className="text-gray-300" size={48}/>}
                  </div>
                  <div className="p-4 flex flex-col flex-1">
                    <h3 className="font-bold text-gray-900 text-base leading-tight mb-2 truncate" title={item.name}>{item.name}</h3>
                    <div className="space-y-1 text-xs text-gray-600 mb-4 flex-1">
                      <p><span className="font-bold text-gray-400">Síntesis:</span> {item.brand}</p>
                      <p><span className="font-bold text-gray-400">Cat:</span> <span className="font-mono bg-gray-100 px-1 rounded">{item.catalogNum || '--'}</span></p>
                      <p><span className="font-bold text-gray-400">Lote:</span> {item.lotNum || '--'}</p>
                      <p className={item.expirationDate && new Date(item.expirationDate) < new Date() ? 'text-red-500 font-bold' : ''}><span className="font-bold text-gray-400">Vence:</span> {item.expirationDate || 'N/A'}</p>
                    </div>
                    
                    <div className="flex items-end justify-between pt-3 border-t border-gray-100">
                      <div>
                        <p className="text-[10px] text-gray-400 uppercase font-bold">Disponible</p>
                        <p className="text-xl font-black text-emerald-700">{item.qty} <span className="text-sm font-medium text-gray-500">{item.unit}</span></p>
                      </div>
                      <div className="flex gap-1">
                        {item.purchaseLink && (
                          <a href={item.purchaseLink} target="_blank" className="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100" title="Comprar"><ExternalLink size={16}/></a>
                        )}
                        {currentUser.isSuperAdmin && (
                          <>
                            <button onClick={()=>{setEditingItem(item); setImagePreview(item.imageUrl); setShowForm(true);}} className="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-200"><Settings size={16}/></button>
                            <button onClick={()=>handleDelete(item.id)} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100"><Trash2 size={16}/></button>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<OligosApp />);
  </script>
</body>
</html>
