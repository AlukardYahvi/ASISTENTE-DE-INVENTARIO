<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biobanco y Muestras - LabManager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseSoft { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
    
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Grid dinámico de ultra-alta calidad para las cajas */
    .box-grid-container {
      background: linear-gradient(145deg, #f8fafc, #f1f5f9);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.03), 0 10px 25px -5px rgba(0,0,0,0.05);
      width: max-content;
      margin: 0 auto;
    }
    .box-grid { display: grid; gap: 8px; width: max-content; }
    
    .box-cell { 
      width: 44px; height: 44px; border-radius: 50%; background: #ffffff; 
      border: 2px solid #e2e8f0; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 11px; font-weight: 800; cursor: pointer; color: #94a3b8;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    
    .box-cell:hover { 
      transform: translateY(-3px) scale(1.05); z-index: 10; 
      border-color: #6366f1; color: #6366f1;
      box-shadow: 0 8px 15px rgba(99,102,241,0.2); 
    }
    
    .box-cell.filled { 
      border-color: transparent; color: #fff; 
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .box-cell.selected { 
      border-color: #10b981; 
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2), 0 8px 15px rgba(0,0,0,0.1); 
      transform: scale(1.15); z-index: 20; 
      color: #10b981;
    }
    .box-cell.filled.selected {
      color: #fff;
      border: 3px solid #10b981;
    }
    
    .row-label, .col-label { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #64748b; }
    
    .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body class="bg-slate-100 text-gray-900 font-sans h-screen overflow-hidden flex flex-col">
  <div id="root" class="h-full"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import * as LucideIcons from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

    // ¡CORRECCIÓN AQUÍ! Se cambió Dropplet por Droplet
    const { Search, Plus, Settings, Trash2, ArrowLeft, Image: ImageIcon, ExternalLink, ShieldAlert, LayoutGrid, List, Key, Beaker, X, Printer, Save, ScanLine, Camera, Droplet, Copy, Info, CheckCircle2 } = LucideIcons;

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDeaQnmO8nRG4stRrbnmONaz_k1EUWqVHc",
      authDomain: "asistente-de-inventario.firebaseapp.com",
      projectId: "asistente-de-inventario",
      storageBucket: "asistente-de-inventario.firebasestorage.app",
      messagingSenderId: "972615078649",
      appId: "1:972615078649:web:a803b9bd801a2481688828"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'lab-manager-yahvi';

    const MASTER_EMAIL = 'yahvi.edsel.hernandez@gmail.com';

    const getRowLabel = (index) => String.fromCharCode(65 + index);

    // Componente Mejorado: Tubo SVG con Gradientes y Brillos
    const TubeVisual = ({ color, isEmpty }) => {
      const hexColor = color ? color.replace('#', '') : 'e2e8f0';
      const liquidColor = isEmpty ? 'transparent' : color;
      
      return (
        <svg viewBox="0 0 100 200" className="w-28 h-56 mx-auto drop-shadow-2xl transition-all duration-300 transform hover:scale-105">
          <defs>
            <linearGradient id={`liquid-${hexColor}`} x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor={liquidColor} stopOpacity="0.7" />
              <stop offset="50%" stopColor={liquidColor} stopOpacity="0.9" />
              <stop offset="100%" stopColor={liquidColor} stopOpacity="0.6" />
            </linearGradient>
            <linearGradient id="glass-shine" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#ffffff" stopOpacity="0.8" />
              <stop offset="20%" stopColor="#ffffff" stopOpacity="0.1" />
              <stop offset="100%" stopColor="#ffffff" stopOpacity="0.4" />
            </linearGradient>
          </defs>

          {/* Tapa */}
          <path d="M 15 20 Q 50 15 85 20 L 88 35 L 12 35 Z" fill="#cbd5e1" stroke="#64748b" strokeWidth="2"/>
          <path d="M 28 8 L 72 8 L 75 20 L 25 20 Z" fill="#94a3b8" stroke="#64748b" strokeWidth="1"/>
          
          {/* Cuerpo del tubo (Cristal) */}
          <path d="M 22 35 L 78 35 L 72 165 Q 50 195 28 165 Z" fill="rgba(255,255,255,0.4)" stroke="#94a3b8" strokeWidth="2.5"/>
          
          {/* Líquido (con gradiente dinámico) */}
          {!isEmpty && (
            <path d="M 25 100 L 75 100 L 71 164 Q 50 190 29 164 Z" fill={`url(#liquid-${hexColor})`} />
          )}

          {/* Brillo del cristal (Glass reflection) */}
          <path d="M 24 38 L 40 38 L 38 160 Q 30 170 28 162 Z" fill="url(#glass-shine)" />

          {/* Marcas de volumen medidoras */}
          <g stroke="#94a3b8" strokeWidth="1.5" opacity="0.7">
            <line x1="26" y1="60" x2="36" y2="60" />
            <line x1="25" y1="90" x2="42" y2="90" strokeWidth="2" />
            <line x1="25" y1="120" x2="35" y2="120" />
            <line x1="26" y1="150" x2="38" y2="150" />
          </g>
        </svg>
      );
    };

    function BiobancoApp() {
      const [currentUser, setCurrentUser] = useState(null);
      const [boxes, setBoxes] = useState([]);
      const [authorizedUsers, setAuthorizedUsers] = useState([]);
      
      const [activeTab, setActiveTab] = useState('catalog');
      const [selectedBox, setSelectedBox] = useState(null);
      const [boxCells, setBoxCells] = useState({});
      const [viewMode, setViewMode] = useState('visual');
      const [selectedCellId, setSelectedCellId] = useState(null);
      const [loading, setLoading] = useState(true);

      const [newAuthEmail, setNewAuthEmail] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [scanInput, setScanInput] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            }
          } catch (err) { console.error(err); }
        };
        initAuth();

        const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
          if (user) {
            const isMaster = user.email === MASTER_EMAIL;
            const authRef = collection(db, 'artifacts', appId, 'public', 'data', 'biobanco_auth');
            onSnapshot(authRef, (snapshot) => {
              const authList = snapshot.docs.map(d => d.data().email);
              setAuthorizedUsers(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
              const isAuthorized = isMaster || authList.includes(user.email);
              
              setCurrentUser({ uid: user.uid, email: user.email, isMaster, isAuthorized });
              setLoading(false);
            });
          } else { 
            setCurrentUser(null);
            setLoading(false);
          }
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!currentUser) return;
        const boxesRef = collection(db, 'artifacts', appId, 'public', 'data', 'inv_cajas_muestras');
        const unsubBoxes = onSnapshot(boxesRef, (snapshot) => {
          setBoxes(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        return () => unsubBoxes();
      }, [currentUser]);

      const handleCreateBox = async (e) => {
        e.preventDefault();
        if (!currentUser.isAuthorized) return alert("No estás autorizado para crear cajas.");
        const fd = new FormData(e.target);
        const newBox = {
          name: fd.get('name'),
          rows: parseInt(fd.get('rows')),
          cols: parseInt(fd.get('cols')),
          tubeType: fd.get('tubeType'),
          barcode: `CAJA-${Date.now().toString(36).toUpperCase()}`,
          owner: currentUser.email,
          createdAt: new Date().toISOString(),
          cells: {}
        };
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inv_cajas_muestras', `box_${Date.now()}`), newBox);
          setActiveTab('catalog');
        } catch(err) { alert(err.message); }
      };

      const openBox = (box) => {
        setSelectedBox(box);
        setBoxCells(box.cells || {});
        setSelectedCellId(null);
        setActiveTab('box_view');
      };

      const saveBoxCells = async () => {
        if (!currentUser.isAuthorized) return alert("Sin permisos de edición.");
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inv_cajas_muestras', selectedBox.id), { cells: boxCells }, { merge: true });
          alert("Caja guardada correctamente.");
          setSelectedBox({...selectedBox, cells: boxCells});
        } catch(err) { alert(err.message); }
      };

      const handleCellChange = (cellId, field, value) => {
        setBoxCells(prev => ({
          ...prev,
          [cellId]: { ...prev[cellId], [field]: value }
        }));
      };

      const handleAddAuthorizedUser = async (e) => {
        e.preventDefault();
        if (!currentUser.isMaster) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'biobanco_auth', `auth_${Date.now()}`), { email: newAuthEmail, addedAt: new Date().toISOString() });
          setNewAuthEmail('');
        } catch(err) {}
      };

      const handleRemoveAuthUser = async (id) => {
        if (!currentUser.isMaster) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'biobanco_auth', id));
      };

      const handleSearchSubmit = (e) => {
        e.preventDefault();
        const val = scanInput.trim().toLowerCase();
        if (!val) return;
        
        const foundBox = boxes.find(b => b.barcode.toLowerCase() === val || b.id.toLowerCase() === val);
        if (foundBox) {
          openBox(foundBox);
          setScanInput('');
          return;
        }

        let foundTube = null;
        let foundInBox = null;
        
        for (const box of boxes) {
          if (box.cells) {
            for (const [cellId, cellData] of Object.entries(box.cells)) {
              if (cellData.code?.toLowerCase() === val || cellData.name?.toLowerCase().includes(val)) {
                foundTube = { cellId, ...cellData };
                foundInBox = box;
                break;
              }
            }
          }
          if (foundTube) break;
        }

        if (foundTube) {
          openBox(foundInBox);
          setSelectedCellId(foundTube.cellId);
        } else {
          alert("Código o Muestra no encontrada en el Biobanco.");
        }
        setScanInput('');
      };

      if (loading) return <div className="h-screen flex items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-indigo-600"></div></div>;

      if (!currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
            <div className="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full">
              <ShieldAlert className="mx-auto text-indigo-500 mb-4" size={56} />
              <h2 className="text-2xl font-black mb-2 text-slate-800">Acceso a Biobanco</h2>
              <p className="text-slate-500 mb-8 font-medium">Debes iniciar sesión en la aplicación principal (LabManager) para acceder a este módulo protegido.</p>
              <a href="index.html" className="block w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-500/30">Ir a LabManager</a>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen flex flex-col bg-slate-50 relative">
          
          {/* HEADER PREMIUM */}
          <div className="bg-gradient-to-r from-indigo-800 via-blue-800 to-indigo-900 px-6 py-5 shadow-lg flex-shrink-0 z-10">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-4 text-white">
                <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md border border-white/20 shadow-inner"><LayoutGrid size={28} className="text-blue-200" /></div>
                <div>
                  <h1 className="text-2xl font-black tracking-tight">Biobanco de Muestras</h1>
                  <p className="text-xs text-indigo-200 font-medium tracking-wide uppercase mt-0.5">Gestión de Cajas, Viales y Congeladores</p>
                </div>
              </div>
              
              <div className="flex items-center gap-2 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 hide-scrollbar">
                <button onClick={()=>setActiveTab('catalog')} className={`px-5 py-2.5 font-bold rounded-xl whitespace-nowrap transition-all flex items-center gap-2 ${activeTab==='catalog'||activeTab==='box_view'?'bg-white text-indigo-800 shadow-md':'bg-white/10 text-white hover:bg-white/20'}`}><LayoutGrid size={18}/> Cajas</button>
                <button onClick={()=>setActiveTab('scanner')} className={`px-5 py-2.5 font-bold rounded-xl whitespace-nowrap transition-all flex items-center gap-2 ${activeTab==='scanner'?'bg-white text-indigo-800 shadow-md':'bg-white/10 text-white hover:bg-white/20'}`}><ScanLine size={18}/> Buscar</button>
                {currentUser.isMaster && (
                  <button onClick={()=>setActiveTab('admin')} className={`px-5 py-2.5 font-bold rounded-xl whitespace-nowrap transition-all flex items-center gap-2 ${activeTab==='admin'?'bg-emerald-500 text-white shadow-md':'bg-white/10 text-emerald-300 hover:bg-white/20'}`}><Key size={18}/> Accesos</button>
                )}
                <div className="w-px h-8 bg-white/20 mx-2 hidden sm:block"></div>
                <a href="index.html" className="px-5 py-2.5 bg-slate-900/50 text-white rounded-xl hover:bg-slate-900 font-bold whitespace-nowrap flex items-center gap-2 transition-all"><ArrowLeft size={16}/> Salir</a>
              </div>
            </div>
          </div>

          {/* MAIN CONTENT AREA */}
          <div className="flex-1 overflow-hidden max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col relative z-0">
            
            {/* VISTA 1: CATÁLOGO DE CAJAS */}
            {activeTab === 'catalog' && (
              <div className="animate-fade-in flex-1 overflow-y-auto pr-2 pb-10">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                  <div className="bg-white p-2 rounded-2xl border border-slate-200 flex items-center shadow-sm w-full max-w-md focus-within:ring-2 focus-within:ring-indigo-500 transition-all">
                    <Search className="text-indigo-400 mx-3" size={22}/>
                    <input type="text" placeholder="Buscar caja por nombre o ID..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full outline-none font-medium text-slate-700 bg-transparent py-1"/>
                  </div>
                  {currentUser.isAuthorized && (
                    <button onClick={()=>setActiveTab('create_box')} className="px-6 py-3.5 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-500/30 flex items-center gap-2 hover:bg-indigo-700 hover:scale-105 transition-all w-full sm:w-auto justify-center"><Plus size={20}/> Registrar Nueva Caja</button>
                  )}
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                  {boxes.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()) || b.barcode.toLowerCase().includes(searchQuery.toLowerCase())).map(box => {
                     const totalCells = box.rows * box.cols;
                     const usedCells = Object.keys(box.cells || {}).filter(k => box.cells[k]?.name).length;
                     const occupancy = Math.round((usedCells / totalCells) * 100) || 0;
                     
                     return (
                      <div key={box.id} onClick={() => openBox(box)} className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 cursor-pointer hover:shadow-2xl hover:-translate-y-1 hover:border-indigo-300 transition-all duration-300 flex flex-col group relative overflow-hidden">
                        
                        {/* Indicador superior de estado */}
                        <div className={`absolute top-0 left-0 w-full h-1.5 ${occupancy === 100 ? 'bg-red-500' : occupancy > 50 ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>

                        <div className="flex justify-between items-start mb-5 mt-1">
                          <div className="bg-indigo-50 text-indigo-600 p-3.5 rounded-2xl group-hover:scale-110 transition-transform"><LayoutGrid size={28}/></div>
                          <span className="text-xs font-black tracking-wider bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg border border-slate-200 shadow-inner">{box.rows}x{box.cols}</span>
                        </div>
                        
                        <h3 className="font-black text-slate-800 text-xl mb-1 line-clamp-1" title={box.name}>{box.name}</h3>
                        <p className="text-xs text-slate-400 font-mono mb-6 bg-slate-50 inline-block px-2 py-1 rounded w-fit">{box.barcode}</p>
                        
                        <div className="mt-auto bg-slate-50 p-4 rounded-2xl border border-slate-100">
                          <div className="flex justify-between text-xs font-bold mb-2">
                            <span className="text-slate-500 uppercase tracking-wider">Ocupación</span>
                            <span className={occupancy > 90 ? 'text-red-600' : 'text-indigo-600'}>{occupancy}% ({usedCells}/{totalCells})</span>
                          </div>
                          <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden shadow-inner">
                            <div className={`h-full rounded-full transition-all duration-1000 ${occupancy > 90 ? 'bg-red-500' : 'bg-indigo-500'}`} style={{width: `${occupancy}%`}}></div>
                          </div>
                          <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-200/60">
                             <p className="text-[10px] text-slate-400 font-bold uppercase truncate">{box.tubeType}</p>
                             <p className="text-[10px] text-slate-400 bg-white px-2 py-0.5 rounded border shadow-sm">{box.owner.split('@')[0]}</p>
                          </div>
                        </div>
                      </div>
                     )
                  })}
                  
                  {boxes.length === 0 && (
                    <div className="col-span-full flex flex-col items-center justify-center text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-300">
                      <LayoutGrid size={64} className="text-slate-300 mb-4"/>
                      <h3 className="text-xl font-bold text-slate-600 mb-2">Aún no hay cajas creadas</h3>
                      <p className="text-slate-400 max-w-sm">Comienza registrando tu primera caja para organizar tus muestras y viales.</p>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* VISTA 2: CREADOR DE CAJAS */}
            {activeTab === 'create_box' && currentUser.isAuthorized && (
              <div className="bg-white p-8 md:p-10 rounded-[2rem] shadow-2xl border border-slate-100 max-w-2xl mx-auto animate-fade-in w-full mt-4">
                <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-5">
                  <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-indigo-100 rounded-xl text-indigo-600"><Plus size={24}/></div> Nueva Caja</h2>
                  <button onClick={()=>setActiveTab('catalog')} className="p-2.5 bg-slate-50 text-slate-400 hover:text-slate-700 hover:bg-slate-200 rounded-full transition-colors"><X size={24}/></button>
                </div>
                <form onSubmit={handleCreateBox} className="space-y-6">
                  <div>
                    <label className="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2">Nombre o Ubicación de la Caja *</label>
                    <input name="name" required placeholder="Ej. Caja Principal -80°C Rack 4" className="w-full p-4 border border-slate-300 rounded-2xl font-bold text-lg outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all bg-slate-50 hover:bg-white" />
                  </div>
                  <div className="grid grid-cols-2 gap-6">
                    <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                      <label className="block text-xs font-black text-blue-700 uppercase tracking-wider mb-3 text-center">Columnas (1, 2, 3...) *</label>
                      <input type="number" name="cols" required defaultValue={10} min="1" max="20" className="w-full p-3 border border-blue-200 rounded-xl font-black text-3xl text-center outline-none focus:border-blue-500 text-blue-900 bg-white shadow-sm" />
                    </div>
                    <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                      <label className="block text-xs font-black text-indigo-700 uppercase tracking-wider mb-3 text-center">Filas (A, B, C...) *</label>
                      <input type="number" name="rows" required defaultValue={10} min="1" max="26" className="w-full p-3 border border-indigo-200 rounded-xl font-black text-3xl text-center outline-none focus:border-indigo-500 text-indigo-900 bg-white shadow-sm" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2 mt-2">Formato de Viales</label>
                    <select name="tubeType" className="w-full p-4 border border-slate-300 rounded-2xl font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all bg-white cursor-pointer text-slate-700">
                      <option value="Eppendorf 1.5mL">Eppendorf 1.5mL / 2.0mL</option>
                      <option value="Tubos PCR 0.2mL">Tubos PCR 0.2mL</option>
                      <option value="Crioviales 2mL">Crioviales 2mL</option>
                      <option value="Tubos Falcon 15mL">Tubos Falcon 15mL</option>
                      <option value="Tubos Falcon 50mL">Tubos Falcon 50mL</option>
                    </select>
                  </div>
                  <button type="submit" className="w-full py-5 mt-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/40 text-lg transition-all flex items-center justify-center gap-2">
                    <LayoutGrid size={22}/> Generar Matriz de Caja
                  </button>
                </form>
              </div>
            )}

            {/* VISTA 3: EDITOR DE CAJA (GRID/EXCEL) */}
            {activeTab === 'box_view' && selectedBox && (
              <div className="flex flex-col h-full animate-fade-in relative pb-4">
                
                {/* Panel de Control Superior */}
                <div className="glass-panel rounded-3xl p-4 sm:p-5 mb-5 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm z-10 sticky top-0">
                  <div className="flex items-center gap-4">
                    <div className="hidden sm:flex bg-gradient-to-br from-indigo-500 to-blue-600 p-3 rounded-2xl text-white shadow-md"><LayoutGrid size={24}/></div>
                    <div>
                      <h2 className="text-xl sm:text-2xl font-black text-slate-800 line-clamp-1">{selectedBox.name}</h2>
                      <div className="flex items-center gap-3 mt-1">
                        <span className="text-xs font-mono bg-slate-200 text-slate-600 px-2 py-0.5 rounded border border-slate-300">{selectedBox.barcode}</span>
                        <span className="text-xs font-bold text-slate-500 flex items-center gap-1"><Beaker size={12}/> {selectedBox.tubeType}</span>
                      </div>
                    </div>
                  </div>
                  
                  <div className="flex w-full sm:w-auto items-center gap-3">
                    <div className="flex bg-slate-100 rounded-xl p-1 border border-slate-200 w-full sm:w-auto">
                      <button onClick={()=>setViewMode('visual')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center justify-center gap-2 ${viewMode==='visual'?'bg-white text-indigo-600 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><LayoutGrid size={16}/> Visual</button>
                      <button onClick={()=>setViewMode('table')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center justify-center gap-2 ${viewMode==='table'?'bg-white text-indigo-600 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><List size={16}/> Lista</button>
                    </div>
                    {currentUser.isAuthorized && (
                      <button onClick={saveBoxCells} className="px-5 py-2.5 bg-emerald-500 text-white font-black rounded-xl shadow-md shadow-emerald-500/30 hover:bg-emerald-600 transition-all flex items-center justify-center gap-2 flex-shrink-0">
                        <Save size={18}/> <span className="hidden sm:inline">Guardar</span>
                      </button>
                    )}
                  </div>
                </div>

                {/* Área Dual de Trabajo */}
                <div className="flex-1 flex flex-col lg:flex-row gap-6 overflow-hidden relative">
                  
                  {/* Zona Izquierda: Grid o Tabla */}
                  <div className={`bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all duration-300 ${viewMode === 'visual' && selectedCellId ? 'lg:w-2/3' : 'w-full'}`}>
                    
                    {/* --- MODO VISUAL GRID --- */}
                    {viewMode === 'visual' && (
                      <div className="flex-1 overflow-auto p-4 sm:p-8 flex justify-center items-center bg-slate-50/50">
                        <div className="box-grid-container">
                          <div className="box-grid" style={{ gridTemplateColumns: `36px repeat(${selectedBox.cols}, minmax(0, 1fr))` }}>
                            {/* Esquina vacía */}
                            <div></div>
                            
                            {/* Cabeceras de Columna (Números) */}
                            {Array.from({length: selectedBox.cols}).map((_, i) => (
                              <div key={`col-${i}`} className="col-label">{i + 1}</div>
                            ))}
                            
                            {/* Filas */}
                            {Array.from({length: selectedBox.rows}).map((_, r) => (
                              <React.Fragment key={`row-${r}`}>
                                {/* Letra de Fila */}
                                <div className="row-label">{getRowLabel(r)}</div>
                                
                                {/* Celdas Interactuables */}
                                {Array.from({length: selectedBox.cols}).map((_, c) => {
                                  const cellId = `${getRowLabel(r)}${c + 1}`;
                                  const cellData = boxCells[cellId];
                                  const hasContent = !!cellData?.name;
                                  const isSelected = selectedCellId === cellId;
                                  const cellColor = cellData?.color || '#3b82f6'; 
                                  
                                  return (
                                    <div 
                                      key={cellId} 
                                      onClick={() => setSelectedCellId(cellId)}
                                      className={`box-cell ${hasContent ? 'filled' : ''} ${isSelected ? 'selected' : ''}`}
                                      style={{ backgroundColor: hasContent ? cellColor : '#ffffff' }}
                                      title={hasContent ? `${cellId}: ${cellData.name}` : `Posición Libre ${cellId}`}
                                    >
                                      {!hasContent && <span className="opacity-40">{cellId}</span>}
                                      {hasContent && <span className="drop-shadow-md">{cellId}</span>}
                                    </div>
                                  )
                                })}
                              </React.Fragment>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* --- MODO TABLA (EXCEL) --- */}
                    {viewMode === 'table' && (
                      <div className="flex-1 overflow-auto">
                        <table className="w-full text-left whitespace-nowrap text-sm">
                          <thead className="bg-slate-50 sticky top-0 border-b border-slate-200 z-10 shadow-sm">
                            <tr>
                              <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-wider text-center">Posición</th>
                              <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-wider">Código Único</th>
                              <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-wider w-1/3">Contenido / Muestra</th>
                              <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-wider">Fecha</th>
                              <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-wider text-center">Color</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {Array.from({length: selectedBox.rows}).map((_, r) => (
                              Array.from({length: selectedBox.cols}).map((_, c) => {
                                const cellId = `${getRowLabel(r)}${c + 1}`;
                                const data = boxCells[cellId] || {};
                                const hasData = !!data.name;
                                
                                return (
                                  <tr key={cellId} className={`transition-colors hover:bg-indigo-50/50 ${hasData ? 'bg-white' : 'bg-slate-50/30'}`}>
                                    <td className="p-3">
                                      <div className={`mx-auto w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs ${hasData ? 'bg-indigo-100 text-indigo-700 border-2 border-indigo-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>
                                        {cellId}
                                      </div>
                                    </td>
                                    <td className="p-3">
                                      <input value={data.code || ''} onChange={(e)=>handleCellChange(cellId, 'code', e.target.value)} disabled={!currentUser.isAuthorized} placeholder="Ej. L-123" className="w-full p-2.5 border border-transparent hover:border-slate-300 focus:border-indigo-500 focus:bg-white bg-transparent rounded-lg outline-none font-mono text-sm transition-all" />
                                    </td>
                                    <td className="p-3">
                                      <input value={data.name || ''} onChange={(e)=>handleCellChange(cellId, 'name', e.target.value)} disabled={!currentUser.isAuthorized} placeholder="Nombre de la muestra..." className={`w-full p-2.5 border border-transparent hover:border-slate-300 focus:border-indigo-500 focus:bg-white bg-transparent rounded-lg outline-none transition-all ${hasData ? 'font-bold text-slate-800' : 'font-medium text-slate-400'}`} />
                                    </td>
                                    <td className="p-3">
                                      <input type="date" value={data.date || ''} onChange={(e)=>handleCellChange(cellId, 'date', e.target.value)} disabled={!currentUser.isAuthorized} className="w-full p-2.5 border border-transparent hover:border-slate-300 focus:border-indigo-500 focus:bg-white bg-transparent rounded-lg outline-none text-slate-600 font-medium transition-all" />
                                    </td>
                                    <td className="p-3 text-center">
                                      <div className="relative inline-block w-8 h-8 rounded-full overflow-hidden border-2 border-slate-200 shadow-sm hover:scale-110 transition-transform cursor-pointer">
                                        <input type="color" value={data.color || '#3b82f6'} onChange={(e)=>handleCellChange(cellId, 'color', e.target.value)} disabled={!currentUser.isAuthorized} className="absolute inset-[-10px] w-12 h-12 cursor-pointer p-0 border-none" />
                                      </div>
                                    </td>
                                  </tr>
                                )
                              })
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>

                  {/* Panel Derecho: DETALLE DEL TUBO (Solo Modo Visual) */}
                  {viewMode === 'visual' && (
                    <div className={`bg-white rounded-3xl shadow-xl border border-slate-200 flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out absolute lg:relative right-0 h-full w-full lg:w-1/3 z-20 ${selectedCellId ? 'translate-x-0 opacity-100' : 'translate-x-full lg:translate-x-0 opacity-0 lg:opacity-100 lg:w-0 lg:hidden'}`}>
                      
                      {selectedCellId ? (
                        <>
                          {/* Header Panel Tubo */}
                          <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/80 backdrop-blur-md rounded-t-3xl">
                            <div className="flex items-center gap-3">
                              <div className="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-black border-2 border-indigo-200 text-lg">
                                {selectedCellId}
                              </div>
                              <h3 className="font-black text-slate-800">Detalles del Vial</h3>
                            </div>
                            <button onClick={()=>setSelectedCellId(null)} className="p-2 bg-white hover:bg-slate-200 text-slate-500 rounded-full transition-colors shadow-sm border border-slate-200"><X size={18}/></button>
                          </div>
                          
                          <div className="p-6 flex-1 flex flex-col overflow-y-auto">
                            
                            {/* Renderizador Visual del Tubo */}
                            <div className="relative pt-6 pb-4 bg-gradient-to-b from-slate-50 to-slate-100 rounded-3xl border border-slate-200 mb-6 shadow-inner flex justify-center items-center overflow-hidden">
                               <TubeVisual 
                                  color={boxCells[selectedCellId]?.name ? (boxCells[selectedCellId]?.color || '#3b82f6') : null} 
                                  isEmpty={!boxCells[selectedCellId]?.name}
                               />
                               
                               {/* Color Picker Flotante */}
                               {currentUser.isAuthorized && (
                                 <div className="absolute bottom-3 right-3 bg-white p-1.5 rounded-xl border border-slate-200 shadow-md flex items-center gap-1.5 hover:scale-105 transition-transform group cursor-pointer overflow-hidden">
                                   <Droplet size={16} className="text-slate-400 group-hover:text-indigo-500 transition-colors z-10 pointer-events-none"/>
                                   <input type="color" value={boxCells[selectedCellId]?.color || '#3b82f6'} onChange={(e)=>handleCellChange(selectedCellId, 'color', e.target.value)} className="absolute inset-[-10px] w-12 h-12 cursor-pointer border-none opacity-0" title="Cambiar color del líquido"/>
                                   <div className="w-4 h-4 rounded-full border border-slate-200 shadow-inner z-0" style={{backgroundColor: boxCells[selectedCellId]?.color || '#3b82f6'}}></div>
                                 </div>
                               )}
                               
                               {/* Badge Vacío */}
                               {!boxCells[selectedCellId]?.name && (
                                  <div className="absolute top-4 right-4 bg-white/80 backdrop-blur-sm text-slate-400 text-[10px] font-black uppercase px-2 py-1 rounded-lg border border-slate-200">Vacío</div>
                               )}
                            </div>

                            {/* Formulario de Datos */}
                            <div className="space-y-5 flex-1">
                              <div>
                                <label className="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1.5">Contenido / Nombre de Muestra *</label>
                                <input value={boxCells[selectedCellId]?.name || ''} onChange={(e)=>handleCellChange(selectedCellId, 'name', e.target.value)} disabled={!currentUser.isAuthorized} placeholder="Ej. Suero Paciente 12" className="w-full p-3.5 border-2 border-slate-200 rounded-xl font-bold text-slate-900 outline-none focus:border-indigo-500 focus:bg-indigo-50/30 transition-all" />
                              </div>
                              <div className="grid grid-cols-2 gap-4">
                                <div>
                                  <label className="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1.5">Código Único</label>
                                  <input value={boxCells[selectedCellId]?.code || ''} onChange={(e)=>handleCellChange(selectedCellId, 'code', e.target.value)} disabled={!currentUser.isAuthorized} placeholder="Ej. L-0982" className="w-full p-3 border-2 border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-500 transition-all text-slate-600" />
                                </div>
                                <div>
                                  <label className="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1.5">Fecha</label>
                                  <input type="date" value={boxCells[selectedCellId]?.date || ''} onChange={(e)=>handleCellChange(selectedCellId, 'date', e.target.value)} disabled={!currentUser.isAuthorized} className="w-full p-3 border-2 border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-500 transition-all text-slate-600 font-medium" />
                                </div>
                              </div>
                              <div>
                                <label className="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1.5">Descripción / Notas Adicionales</label>
                                <textarea value={boxCells[selectedCellId]?.desc || ''} onChange={(e)=>handleCellChange(selectedCellId, 'desc', e.target.value)} disabled={!currentUser.isAuthorized} rows="3" placeholder="Volumen, pureza, buffer, observaciones..." className="w-full p-3 border-2 border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-500 transition-all text-slate-600 resize-none"></textarea>
                              </div>
                            </div>
                          </div>
                          
                          {/* Botón Eliminar Muestra */}
                          {currentUser.isAuthorized && boxCells[selectedCellId]?.name && (
                            <div className="p-5 border-t border-slate-100 bg-slate-50 rounded-b-3xl">
                              <button onClick={() => {
                                if(window.confirm(`¿Vaciar la posición ${selectedCellId}? Se perderán los datos de la muestra.`)){
                                  const newCells = {...boxCells};
                                  delete newCells[selectedCellId];
                                  setBoxCells(newCells);
                                }
                              }} className="w-full py-3.5 bg-white border-2 border-red-100 text-red-600 font-bold rounded-xl hover:bg-red-50 hover:border-red-200 transition-all flex justify-center items-center gap-2">
                                <Trash2 size={18}/> Vaciar Posición {selectedCellId}
                              </button>
                            </div>
                          )}
                        </>
                      ) : (
                        // Estado Vacío del Panel (Solo visible en Desktop si no hay selección)
                        <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-50/50 rounded-3xl">
                          <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-200 mb-6 relative">
                            <Info size={40} className="text-indigo-300" />
                            <div className="absolute -top-1 -right-1 w-6 h-6 bg-emerald-400 rounded-full border-2 border-white animate-bounce"></div>
                          </div>
                          <h3 className="text-xl font-black text-slate-700 mb-2">Selecciona una Posición</h3>
                          <p className="text-slate-500 text-sm">Haz clic en cualquier celda de la cuadrícula para ver o editar la muestra almacenada en ese vial.</p>
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div>
            )}

            {/* VISTA 4: ACCESOS MASTER */}
            {activeTab === 'admin' && currentUser.isMaster && (
              <div className="bg-white p-8 md:p-10 rounded-[2rem] shadow-2xl border border-emerald-100 max-w-3xl mx-auto animate-fade-in w-full mt-4">
                <div className="flex items-center gap-5 mb-8 pb-6 border-b border-slate-100">
                  <div className="bg-emerald-100 text-emerald-600 p-4 rounded-2xl shadow-inner"><Key size={32}/></div>
                  <div>
                    <h2 className="text-2xl sm:text-3xl font-black text-slate-800">Control de Accesos</h2>
                    <p className="text-sm text-slate-500 font-medium mt-1">Autoriza correos del equipo para crear y editar cajas del Biobanco.</p>
                  </div>
                </div>

                <form onSubmit={handleAddAuthorizedUser} className="flex flex-col sm:flex-row gap-4 mb-10">
                  <input type="email" value={newAuthEmail} onChange={e=>setNewAuthEmail(e.target.value)} required placeholder="ejemplo@laboratorio.com" className="flex-1 p-4 border-2 border-slate-200 rounded-2xl outline-none focus:border-emerald-500 focus:bg-emerald-50/30 transition-all font-medium" />
                  <button type="submit" className="px-8 py-4 bg-emerald-500 text-white font-black rounded-2xl hover:bg-emerald-600 shadow-lg shadow-emerald-500/30 whitespace-nowrap transition-all flex items-center justify-center gap-2">
                    <CheckCircle2 size={20}/> Dar Acceso
                  </button>
                </form>

                <h3 className="font-black text-slate-400 uppercase tracking-widest text-xs mb-4">Usuarios con Privilegios ({authorizedUsers.length + 1})</h3>
                <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                  <table className="w-full text-left text-sm">
                    <thead className="bg-slate-50 border-b border-slate-200">
                      <tr>
                        <th className="p-4 font-black text-slate-500 uppercase tracking-wider">Email del Investigador</th>
                        <th className="p-4 font-black text-slate-500 uppercase tracking-wider">Otorgado</th>
                        <th className="p-4 text-center font-black text-slate-500 uppercase tracking-wider">Retirar</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 bg-white">
                      <tr className="bg-emerald-50/30">
                        <td className="p-4 font-bold text-emerald-700 flex items-center gap-2"><ShieldAlert size={16}/> {MASTER_EMAIL}</td>
                        <td className="p-4 text-slate-400 font-medium font-mono text-xs">Administrador Maestro</td>
                        <td className="p-4 text-center text-slate-300">-</td>
                      </tr>
                      {authorizedUsers.map(u => (
                        <tr key={u.id} className="hover:bg-slate-50 transition-colors">
                          <td className="p-4 font-bold text-slate-700">{u.email}</td>
                          <td className="p-4 text-slate-500 font-medium">{new Date(u.addedAt).toLocaleDateString()}</td>
                          <td className="p-4 text-center">
                            <button onClick={()=>handleRemoveAuthUser(u.id)} className="p-2 text-red-400 hover:text-white hover:bg-red-500 rounded-lg transition-colors">
                              <Trash2 size={16} className="mx-auto"/>
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* VISTA 5: ESCÁNER */}
            {activeTab === 'scanner' && (
              <div className="max-w-2xl w-full mx-auto space-y-6 animate-fade-in flex flex-col justify-center h-full pb-20">
                <div className="text-center mb-6">
                  <div className="inline-block p-4 bg-indigo-100 text-indigo-600 rounded-full mb-4 shadow-inner">
                    <ScanLine size={48}/>
                  </div>
                  <h2 className="text-3xl font-black text-slate-800">Rastreador de Muestras</h2>
                  <p className="text-slate-500 mt-2 font-medium max-w-md mx-auto">Escanea el código de barras de una caja o teclea el código único del tubo para ubicarlo al instante en el biobanco.</p>
                </div>

                <div className="bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8 md:p-10">
                  <form onSubmit={handleSearchSubmit} className="space-y-6">
                    <div className="relative group">
                      <div className="absolute inset-y-0 left-6 flex items-center pointer-events-none">
                        <Search className="text-indigo-400 group-focus-within:text-indigo-600 transition-colors" size={28} />
                      </div>
                      <input type="text" value={scanInput} onChange={(e)=>setScanInput(e.target.value)} placeholder="Ej. CAJA-MRFCVNXF o L-1234" className="w-full pl-16 pr-6 py-6 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none font-mono text-xl shadow-inner text-center font-bold text-slate-800 transition-all placeholder-slate-300" autoFocus />
                    </div>
                    <button type="submit" className="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl uppercase tracking-widest hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/40 hover:-translate-y-1 transition-all text-lg flex justify-center items-center gap-3">
                      Localizar en Biobanco
                    </button>
                  </form>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<BiobancoApp />);
  </script>
</body>
</html>
