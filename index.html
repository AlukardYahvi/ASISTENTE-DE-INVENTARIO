<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabManager - Asistente de Inventario (Pro)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lector de Códigos de Barras y QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    #qr-reader, #qr-reader-form { width: 100%; border-radius: 0.5rem; overflow: hidden; border: 2px solid #bfdbfe; }
    #qr-reader__dashboard_section_csr span { color: #1e3a8a !important; font-weight: bold; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 font-sans">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import * as LucideIcons from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

    const { 
      LayoutDashboard, Boxes, ScanLine, AlertTriangle, Search, Plus, Minus,
      Camera, Keyboard, CheckCircle2, PackageSearch, MapPin, History,
      Mail, ExternalLink, Calendar, ShieldCheck, User, LogOut, ShoppingCart, 
      Info, QrCode, Settings, Folder, ChevronRight, ArrowLeft, Users, ShieldAlert, X, Printer,
      Image: ImageIcon, Truck, Beaker, FileText, Download, LayoutGrid, List, CreditCard, ClipboardSignature, CheckSquare, Layers, Upload, Trash2,
      Dna, TestTubes // Íconos para sub-inventarios
    } = LucideIcons;

    const MIS_CREDENCIALES_FIREBASE = {
      apiKey: "AIzaSyDeaQnmO8nRG4stRrbnmONaz_k1EUWqVHc",
      authDomain: "asistente-de-inventario.firebaseapp.com",
      projectId: "asistente-de-inventario",
      storageBucket: "asistente-de-inventario.firebasestorage.app",
      messagingSenderId: "972615078649",
      appId: "1:972615078649:web:a803b9bd801a2481688828",
      measurementId: "G-MTYN0VSK14"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MIS_CREDENCIALES_FIREBASE;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'lab-manager-yahvi';

    const CATEGORIES = [
      { id: 'equipos', name: 'Equipos y Aparatos Fijos', icon: '💻', color: 'bg-blue-100 text-blue-700' },
      { id: 'cristaleria', name: 'Cristalería y Plásticos', icon: '🧪', color: 'bg-cyan-100 text-cyan-700' },
      { id: 'reactivos', name: 'Reactivos Generales', icon: '🧫', color: 'bg-purple-100 text-purple-700' },
      { id: 'kits', name: 'Kits y Columnas (RNA/DNA/Prot)', icon: '🧬', color: 'bg-emerald-100 text-emerald-700' },
      { id: 'cultivo', name: 'Cultivo Celular', icon: '🦠', color: 'bg-rose-100 text-rose-700' },
      { id: 'consumibles', name: 'Consumibles Generales', icon: '📦', color: 'bg-amber-100 text-amber-700' }
    ];

    const SUPER_ADMIN_EMAILS = [
      'yahvi.edsel.hernandez@gmail.com',
      'asistentelicam@gmail.com',
      'nnajerag@ipn.mx',
      'cgomezm310393@gmail.com'
    ];

    function LabInventoryApp() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [currentUserData, setCurrentUserData] = useState(null);
      const [allUsers, setAllUsers] = useState([]);
      const [authErrorDomain, setAuthErrorDomain] = useState(false);
      const [mockEmail, setMockEmail] = useState(SUPER_ADMIN_EMAILS[0]);
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [inventory, setInventory] = useState([]);
      const [logs, setLogs] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [loading, setLoading] = useState(true);

      const [selectedFolder, setSelectedFolder] = useState(null);
      const [showItemForm, setShowItemForm] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [viewingItem, setViewingItem] = useState(null); // NUEVO ESTADO PARA DETALLES
      const [generatedQR, setGeneratedQR] = useState('');
      const [imagePreview, setImagePreview] = useState(null); 

      const [scanInput, setScanInput] = useState('');
      const [scannedItem, setScannedItem] = useState(null);
      const [scanAction, setScanAction] = useState('info');
      const [scanAmount, setScanAmount] = useState(1);
      const [scanReason, setScanReason] = useState('Protocolo rutinario');
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraActiveForm, setCameraActiveForm] = useState(false);
      const [viewMode, setViewMode] = useState('table');
      const [formStockType, setFormStockType] = useState('unit');
      
      const scannerInputRef = useRef(null);
      const hiddenSubmitBtnRef = useRef(null);

      // --- INICIALIZACIÓN FIREBASE ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            }
          } catch (err) { console.error(err); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          setFirebaseUser(user);
          if (user && user.email) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'lab_users', user.uid);
            try {
               await setDoc(userRef, {
                uid: user.uid, email: user.email, name: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL || '', lastLogin: new Date().toISOString(),
                ...(SUPER_ADMIN_EMAILS.includes(user.email) ? { role: 'superadmin' } : {}) 
              }, { merge: true });
            } catch(e) {}
          } else if (!user) { setCurrentUserData(null); }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!firebaseUser) { setLoading(false); return; }

        const inventoryRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
        const unsubInv = onSnapshot(inventoryRef, (snapshot) => {
          setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          setLoading(false);
        });

        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'lab_users');
        const unsubUsers = onSnapshot(usersRef, (snapshot) => {
          const usersList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllUsers(usersList);
          const myData = usersList.find(u => u.uid === firebaseUser.uid);
          if (myData) {
             if (SUPER_ADMIN_EMAILS.includes(myData.email)) myData.role = 'superadmin';
             if (!myData.role) myData.role = 'user'; 
             setCurrentUserData(myData);
          }
        });

        const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
        const unsubLogs = onSnapshot(logsRef, (snapshot) => {
          const logsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setLogs(logsList.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
        });

        return () => { unsubInv(); unsubUsers(); unsubLogs(); };
      }, [firebaseUser]);

      // --- CAMARAS ---
      useEffect(() => {
        let html5QrcodeScanner;
        if (cameraActive && activeTab === 'scanner') {
          html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
          html5QrcodeScanner.render((decodedText) => {
            setScanInput(decodedText); setCameraActive(false); html5QrcodeScanner.clear();
            setTimeout(() => { if (hiddenSubmitBtnRef.current) hiddenSubmitBtnRef.current.click(); }, 150);
          }, () => {});
        }
        return () => { if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(()=>{}); };
      }, [cameraActive, activeTab]);

      useEffect(() => {
        let formScanner;
        if (cameraActiveForm && showItemForm) {
          formScanner = new Html5QrcodeScanner("qr-reader-form", { fps: 10, qrbox: { width: 250, height: 150 } }, false);
          formScanner.render((decodedText) => {
            setGeneratedQR(decodedText); setCameraActiveForm(false); formScanner.clear();
          }, () => {});
        }
        return () => { if (formScanner) formScanner.clear().catch(()=>{}); };
      }, [cameraActiveForm, showItemForm]);

      // --- MANEJO DE IMÁGENES Y FORMULARIO ---
      useEffect(() => {
        if (showItemForm && editingItem) {
          setImagePreview(editingItem.imageUrl || null);
          setFormStockType(editingItem.stockType || 'unit');
        } else if (!showItemForm) {
          setImagePreview(null);
          setFormStockType('unit');
        }
      }, [showItemForm, editingItem]);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500; const MAX_HEIGHT = 500;
            let width = img.width; let height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            setImagePreview(dataUrl);
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      };

      // --- DERIVADOS ---
      const isAdmin = currentUserData?.role === 'superadmin' || currentUserData?.role === 'admin';
      const lowStockItems = inventory.filter(item => item.qty < item.minThreshold);
      const getExpiringSoonItems = () => {
        const today = new Date(); const thirtyDays = new Date(); thirtyDays.setDate(today.getDate() + 30);
        return inventory.filter(i => i.expirationDate && new Date(i.expirationDate) <= thirtyDays && new Date(i.expirationDate) >= today).sort((a,b) => new Date(a.expirationDate) - new Date(b.expirationDate));
      };
      const expiringItems = getExpiringSoonItems();

      // --- FUNCIONES COMPRAS ---
      const handleOrderStatusChange = async (item, newStatus) => {
        if (!isAdmin) return alert("Solo administradores.");
        let newQty = item.qty;
        if (newStatus === 'received') {
          const addAmount = (item.minThreshold * 2) - item.qty; 
          newQty = item.qty + (addAmount > 0 ? addAmount : item.minThreshold);
          newStatus = 'pending'; 
          
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', `log_${Date.now()}`), {
            itemId: item.id, itemName: item.name, action: 'add', amount: newQty - item.qty, reason: 'Recepción de Pedido',
            userName: currentUserData.name, userEmail: currentUserData.email, timestamp: new Date().toISOString()
          });
          alert(`¡Pedido recibido! Se han ingresado ${newQty - item.qty} ${item.stockType === 'jar' ? '%' : item.unit} al inventario.`);
        }
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', item.id), { orderStatus: newStatus, qty: newQty }, { merge: true }); } catch (e) { alert("Error."); }
      };

      const handleSendPurchaseRequest = (item) => {
        const emailTo = "compras.directivo@laboratorio.com"; 
        const subject = encodeURIComponent(`Requisición LabManager - ${item.name}`);
        const body = encodeURIComponent(`Solicitud de compra.\nProducto: ${item.name}\nCatálogo: ${item.catalogNum||'N/A'}\nEnlace Compra: ${item.purchaseLink || 'N/A'}\nStock actual: ${item.qty} ${item.stockType === 'jar' ? '%' : item.unit}\nMin: ${item.minThreshold}\n\nGestión Automática LabManager.`);
        window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
        handleOrderStatusChange(item, 'ordered');
      };

      // --- FUNCIONES EXPORTAR (RESPALDO Y ETIQUETAS) ---
      const handleExportCSV = () => {
        if (!isAdmin) return alert("Solo administradores.");
        const headers = ['ID/Codigo', 'Nombre', 'Categoria', 'Catalogo', 'Lote', 'Proveedor', 'Marca', 'Cantidad', 'Tipo_Stock', 'Unidad', 'Minimo', 'Ubicacion', 'Caducidad', 'Enlace_Compra', 'Observaciones'];
        const rows = inventory.map(i => [
          `"${i.barcode||i.id}"`, `"${i.name}"`, `"${i.category}"`, 
          `"${i.catalogNum||''}"`, `"${i.lotNum||''}"`, `"${i.provider||''}"`, `"${i.brand||''}"`, 
          i.qty, `"${i.stockType||'unit'}"`, `"${i.unit}"`, i.minThreshold, `"${i.location}"`, `"${i.expirationDate||''}"`, `"${i.purchaseLink||''}"`, `"${i.observations||''}"`
        ]);
        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Respaldo_LabManager_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      // Función para imprimir una lista masiva (Catálogo minucioso)
      const handlePrintAllLabels = () => {
        const printWindow = window.open('', '_blank');
        const itemsToPrint = selectedFolder ? inventory.filter(i => i.category === selectedFolder) : inventory;
        
        if (itemsToPrint.length === 0) return alert("No hay elementos para imprimir en esta vista.");

        let labelsHtml = itemsToPrint.map(item => {
          const code = item.barcode || item.id;
          const name = item.name;
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(code)}`;
          const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(code)}&scaleX=2&scaleY=1&includetext=true`;
          
          return `
            <div class="label-box">
              <div class="title">${name}</div>
              <div class="codes">
                 <img src="${qrUrl}" alt="QR" class="qr" />
                 <img src="${barcodeUrl}" alt="Barcode" class="barcode" />
              </div>
              <div class="meta"><strong>Lote:</strong> ${item.lotNum || '--'} | <strong>Cat:</strong> ${item.catalogNum || '--'}</div>
            </div>
          `;
        }).join('');

        printWindow.document.write(`
          <html><head><title>Catálogo General de Etiquetas</title><style>
            body { font-family: sans-serif; margin: 0; padding: 20px; background: #fff;}
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(7cm, 1fr)); gap: 15px; }
            .label-box { border: 1px dashed #666; padding: 10px; display: flex; flex-direction: column; align-items: center; text-align: center; border-radius: 4px;}
            .title { font-size: 12px; font-weight: bold; margin-bottom: 8px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .codes { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%;}
            .qr { width: 50px; height: 50px; }
            .barcode { height: 40px; max-width: 120px; object-fit: contain; }
            .meta { font-size: 10px; color: #333; margin-top: 8px; border-top: 1px solid #eee; padding-top: 4px; width: 100%;}
            @media print { 
              body { padding: 0; } 
              .label-box { page-break-inside: avoid; border: 1px solid #000; }
            }
          </style></head><body>
            <h2 style="text-align:center; margin-bottom: 20px;">Catálogo General de Etiquetas</h2>
            <div class="grid">${labelsHtml}</div>
            <script>
              setTimeout(() => { window.print(); }, 2000); 
            <\/script>
          </body></html>
        `);
        printWindow.document.close();
      };

      // --- FUNCIONES LOGIN ---
      const handleGoogleLogin = async () => {
        const hostname = window.location.hostname || '';
        if (hostname.includes('googleusercontent.com') || hostname.includes('csb.app') || window.self !== window.top) return setAuthErrorDomain(true);
        try { setLoading(true); await signInWithPopup(auth, new GoogleAuthProvider()); } catch (e) { setAuthErrorDomain(true); setLoading(false); }
      };
      const handleSimulatedLogin = async () => {
        setLoading(true);
        try {
          let currentUid = auth.currentUser?.uid;
          if (!currentUid) { const cred = await signInAnonymously(auth); currentUid = cred.user.uid; }
          const role = SUPER_ADMIN_EMAILS.includes(mockEmail) ? 'superadmin' : 'user';
          const simData = { uid: currentUid, email: mockEmail, name: mockEmail.split('@')[0], photoURL: '', lastLogin: new Date().toISOString(), role };
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lab_users', currentUid), simData, { merge: true });
          setCurrentUserData(simData);
        } catch(e) {} setLoading(false);
      };
      const handleLogout = () => { auth.signOut(); setActiveTab('dashboard'); setCurrentUserData(null); setAuthErrorDomain(false); };
      const handleUpdateUserRole = async (userId, newRole) => {
        if (currentUserData.role !== 'superadmin') return;
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lab_users', userId), { role: newRole }, { merge: true }); } catch(e) {}
      };

      // --- CRUD ---
      const generateUniqueQR = () => {
        let code = ''; let isUnique = false;
        while (!isUnique) {
          code = `LAB-${Date.now().toString(36).toUpperCase()}-${Math.random().toString(36).substr(2,4).toUpperCase()}`;
          if (!inventory.some(i => i.barcode === code)) isUnique = true;
        }
        setGeneratedQR(code); return code;
      };
      
      const handlePrintLabel = (itemData, fallback = null) => {
        const code = itemData?.barcode || fallback; const name = itemData?.name || 'LabManager';
        if (!code) return alert("Genera o escanea un código primero.");
        const printWindow = window.open('', '_blank');
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(code)}`;
        const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(code)}&scaleX=2&scaleY=1&includetext=true`;

        printWindow.document.write(`
          <html><head><title>Imprimir</title><style>
            body{margin:0;display:flex;justify-content:center;align-items:center;padding-top:20px;font-family:sans-serif;} 
            .label{width:6.5cm;height:4.5cm;border:1px dashed #000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.2cm;box-sizing:border-box;} 
            .title{font-size:11px;font-weight:bold;text-align:center;overflow:hidden;white-space:nowrap;max-width:100%;margin-bottom:6px;} 
            .codes { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%;}
            .qr{width:1.8cm;height:1.8cm;} 
            .barcode{height:1.2cm; max-width: 3.5cm; object-fit: contain;}
            @media print{@page{margin:0;} body{padding:0;} .label{border:none;}}
          </style></head><body>
            <div class="label">
              <div class="title">${name}</div>
              <div class="codes">
                <img src="${qrUrl}" alt="QR"/>
                <img src="${barcodeUrl}" alt="Barcode"/>
              </div>
            </div>
            <script>setTimeout(() => { window.print(); window.close(); }, 1500);<\/script>
          </body></html>
        `);
        printWindow.document.close();
      };

      const handleSaveItem = async (e) => {
        e.preventDefault(); if (!isAdmin) return alert("Sin permisos.");
        const formData = new FormData(e.target); const itemData = Object.fromEntries(formData.entries());
        
        itemData.qty = Number(itemData.qty); 
        itemData.minThreshold = Number(itemData.minThreshold);
        if (generatedQR && !itemData.barcode) itemData.barcode = generatedQR;
        if (!itemData.orderStatus) itemData.orderStatus = 'pending';
        itemData.imageUrl = imagePreview || editingItem?.imageUrl || '';

        const docId = editingItem ? editingItem.id : `item_${Date.now()}`;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', docId), itemData, { merge: true });
          if (!editingItem) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', `log_${Date.now()}`), {
              itemId: docId, itemName: itemData.name, action: 'create', amount: itemData.qty, reason: 'Registro inicial',
              userName: currentUserData.name, userEmail: currentUserData.email, timestamp: new Date().toISOString()
            });
          }
          setShowItemForm(false); setEditingItem(null); setGeneratedQR(''); setImagePreview(null);
        } catch (err) { alert("Error: " + err.message); }
      };

      const handleDeleteItem = async (id, name) => {
        if (!SUPER_ADMIN_EMAILS.includes(currentUserData.email)) return alert("Solo los Propietarios pueden eliminar registros completos.");
        if (window.confirm(`¿Estás seguro de que deseas eliminar permanentemente '${name}' del inventario? Esta acción no se puede deshacer.`)) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', `log_${Date.now()}`), {
            itemId: id, itemName: name, action: 'delete', amount: 0, reason: 'Eliminación del sistema',
            userName: currentUserData.name, userEmail: currentUserData.email, timestamp: new Date().toISOString()
          });
        }
      };

      // --- ESCANER ---
      const handleBarcodeSubmit = (e) => {
        if(e) e.preventDefault(); if (!scanInput.trim()) return;
        const searchVal = scanInput.trim().toLowerCase();
        const foundItem = inventory.find(i => 
          i.barcode?.toLowerCase() === searchVal || 
          i.id?.toLowerCase() === searchVal || 
          i.catalogNum?.toLowerCase() === searchVal || 
          i.lotNum?.toLowerCase() === searchVal
        );

        if (foundItem) { setScannedItem(foundItem); setScanAmount(1); setScanReason('Protocolo rutinario'); } 
        else { alert(`Código, Catálogo o Lote no encontrado.`); setScannedItem(null); }
        setScanInput(''); 
      };

      const executeScanAction = async () => {
        if (!scannedItem) return;
        if (scanAction === 'add' && !isAdmin) return alert("Solo administradores pueden ingresar stock.");
        const newQty = scanAction === 'add' ? scannedItem.qty + scanAmount : scannedItem.qty - scanAmount;
        if (newQty < 0) return alert("Stock negativo no permitido.");

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', scannedItem.id), { qty: newQty }, { merge: true });
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', `log_${Date.now()}_${Math.floor(Math.random()*1000)}`), {
            itemId: scannedItem.id, itemName: scannedItem.name, action: scanAction, amount: scanAmount,
            reason: scanAction === 'add' ? 'Reabastecimiento manual' : scanReason,
            userName: currentUserData.name, userEmail: currentUserData.email, timestamp: new Date().toISOString()
          });
          setScannedItem({ ...scannedItem, qty: newQty });
          setScanAction('info');
          const btn = document.getElementById('btn-action-success');
          if(btn) { btn.innerHTML = '¡Auditoría Exitosa!'; btn.classList.add('bg-green-600'); setTimeout(() => { btn.innerHTML = 'Confirmar'; btn.classList.remove('bg-green-600'); }, 2000); }
        } catch (e) { alert("Error."); }
      };

      // --- RENDERIZADO LOGIN ---
      if (!currentUserData) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-900 to-blue-900 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 animate-fade-in flex flex-col items-center text-center">
              <div className="bg-blue-600 p-4 rounded-2xl text-white mb-6 shadow-[0_0_20px_rgba(37,99,235,0.4)]"><Boxes size={48} /></div>
              <h1 className="text-3xl font-extrabold text-gray-800 mb-2">LabManager Pro</h1>
              <p className="text-gray-500 font-medium mb-8">Asistente de Inventario de Laboratorio</p>
              {loading ? <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-8"></div> : (
                <div className="w-full space-y-4">
                  {!authErrorDomain ? (
                    <button onClick={handleGoogleLogin} className="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-3">
                      <svg className="w-6 h-6" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                      Continuar con Google
                    </button>
                  ) : (
                    <div className="bg-orange-50 p-6 rounded-xl border border-orange-200 text-left">
                      <p className="text-sm text-orange-800 mb-4 font-medium">Entorno protegido. Simula acceso para probar:</p>
                      <input type="email" value={mockEmail} onChange={(e) => setMockEmail(e.target.value)} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none mb-3" />
                      <button onClick={handleSimulatedLogin} className="w-full bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-md">Ingresar al Sistema</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-gray-900">
          {/* SIDEBAR */}
          <aside className="w-72 bg-slate-900 text-slate-300 flex-col hidden md:flex shadow-2xl z-20">
            <div className="p-6 border-b border-slate-800 flex items-center gap-3 text-white">
              <div className="bg-blue-600 p-2 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.5)]"><Boxes size={24} /></div>
              <h1 className="font-bold text-xl">LabManager Pro</h1>
            </div>
            
            <nav className="flex-1 py-6 px-4 space-y-1 overflow-y-auto">
              <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-2">Navegación</p>
              <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><LayoutDashboard size={20} /> Dashboard General</button>
              <button onClick={() => {setActiveTab('inventory'); setSelectedFolder(null); setShowItemForm(false);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'inventory' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><Folder size={20} /> Catálogo de Inventario</button>
              <button onClick={() => setActiveTab('scanner')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'scanner' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><ScanLine size={20} /> Escáner de Uso</button>
              
              <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-6">Módulos Especializados</p>
              <button onClick={() => setActiveTab('orders')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'orders' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800'}`}><CreditCard size={20} /> Compras y Pedidos</button>

              <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-6">Inventarios Específicos</p>
              <a href="inventario_anticuerpos.html" className="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-300">
                <TestTubes size={20} /> Inv. Anticuerpos
              </a>
              <a href="inventario_oligos.html" className="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-300">
                <Dna size={20} /> Inv. Oligos
              </a>
              <a href="inventario_de_muestras_y_biobanco.html" className="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-300">
  <LayoutGrid size={20} /> Cajas y Muestras
</a>

              <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-6">Auditoría / Calidad</p>
              <button onClick={() => setActiveTab('history')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'history' ? 'bg-slate-700 text-white border border-slate-600' : 'hover:bg-slate-800'}`}><ClipboardSignature size={20} /> Historial Operativo</button>
              {currentUserData?.role === 'superadmin' && (
                <button onClick={() => setActiveTab('users')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mt-1 transition-all ${activeTab === 'users' ? 'bg-purple-600 text-white' : 'hover:bg-slate-800'}`}><Users size={20} /> Control Accesos</button>
              )}
            </nav>

            <div className="p-4 bg-slate-950">
              <div className="flex items-center gap-3 mb-3 bg-slate-800 p-3 rounded-xl">
                <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white overflow-hidden">
                  {currentUserData.photoURL ? <img src={currentUserData.photoURL} /> : currentUserData.name.charAt(0).toUpperCase()}
                </div>
                <div className="overflow-hidden">
                  <p className="text-white font-bold truncate text-sm">{currentUserData.name}</p>
                  <p className={`text-[10px] uppercase font-bold tracking-wider ${isAdmin ? 'text-purple-400' : 'text-emerald-400'}`}>{currentUserData.role}</p>
                </div>
              </div>
              <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm font-bold text-red-400 hover:bg-red-600/20 rounded-lg"><LogOut size={16} /> Salir</button>
            </div>
          </aside>

          {/* MAIN CONTENT */}
          <main className="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-10">
              <span className="font-bold flex items-center gap-2"><Boxes size={24} className="text-blue-500" /> LabManager</span>
              <div className="flex gap-4">
                <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-blue-400' : ''}><LayoutDashboard/></button>
                <button onClick={() => setActiveTab('inventory')} className={activeTab === 'inventory' ? 'text-blue-400' : ''}><Folder/></button>
                <button onClick={() => setActiveTab('scanner')} className={activeTab === 'scanner' ? 'text-blue-400' : ''}><ScanLine/></button>
                <a href="inventario_muestras.html" title="Cajas y Muestras" className="text-gray-400 hover:text-blue-400"><LayoutGrid size={24}/></a>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 relative">
              
              {/* --- DASHBOARD --- */}
              {activeTab === 'dashboard' && (
                <div className="space-y-6 max-w-7xl mx-auto animate-fade-in">
                  <div>
                    <h2 className="text-3xl font-extrabold text-gray-900">Hola, {currentUserData.name.split(' ')[0]}</h2>
                    <p className="text-gray-500 mt-1">Panel General de Laboratorio</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div onClick={() => setActiveTab('inventory')} className="bg-white p-6 rounded-2xl border shadow-sm flex items-center gap-5 cursor-pointer hover:shadow-md">
                      <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl"><Boxes size={32}/></div>
                      <div><p className="text-sm text-gray-500 font-bold uppercase">Elementos</p><p className="text-4xl font-black text-gray-800">{inventory.length}</p></div>
                    </div>
                    <div onClick={() => setActiveTab('orders')} className="bg-white p-6 rounded-2xl border shadow-sm flex items-center gap-5 cursor-pointer hover:shadow-md">
                      <div className="p-4 bg-red-50 text-red-600 rounded-2xl"><AlertTriangle size={32}/></div>
                      <div><p className="text-sm text-gray-500 font-bold uppercase">Bajo Stock</p><p className="text-4xl font-black text-red-600">{lowStockItems.length}</p></div>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border shadow-sm flex items-center gap-5">
                      <div className="p-4 bg-orange-50 text-orange-600 rounded-2xl"><Calendar size={32}/></div>
                      <div><p className="text-sm text-gray-500 font-bold uppercase">Caducan Pronto</p><p className="text-4xl font-black text-orange-600">{expiringItems.length}</p></div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- MÓDULO COMPRAS --- */}
              {activeTab === 'orders' && (
                <div className="max-w-7xl mx-auto animate-fade-in space-y-6">
                  <div className="flex items-center gap-3 mb-6">
                    <div className="bg-indigo-600 p-3 rounded-xl text-white shadow-lg"><CreditCard size={28}/></div>
                    <div>
                      <h2 className="text-3xl font-black text-gray-900">Módulo de Compras</h2>
                      <p className="text-gray-500">Solicita, rastrea y reabastece automáticamente tu inventario.</p>
                    </div>
                  </div>
                  
                  <div className="bg-white rounded-3xl border border-gray-200 shadow-sm p-6 min-h-[500px]">
                    {lowStockItems.length === 0 && inventory.filter(i => i.orderStatus === 'ordered').length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-64 text-gray-400"><CheckCircle2 size={64} className="text-green-400 mb-4"/><p className="text-xl font-bold">Todo está bajo control.</p><p>No hay reactivos por debajo del límite mínimo.</p></div>
                    ) : (
                      <div className="space-y-4">
                        {lowStockItems.filter(i => i.orderStatus !== 'ordered').map(item => (
                          <div key={item.id} className="flex justify-between items-center p-5 bg-red-50 border border-red-100 rounded-2xl">
                            <div className="flex gap-4 items-center">
                              <AlertTriangle className="text-red-500" size={24}/>
                              <div>
                                <h3 className="font-bold text-gray-900 text-lg">{item.name}</h3>
                                <p className="text-sm text-gray-600">Stock: <strong className="text-red-600">{item.qty} {item.stockType === 'jar' ? '%' : item.unit}</strong> (Mínimo: {item.minThreshold}) | Prov: {item.provider || 'N/A'} | Cat: {item.catalogNum || 'N/A'}</p>
                              </div>
                            </div>
                            {isAdmin && (
                              <div className="flex gap-2">
                                {item.purchaseLink && (
                                  <a href={item.purchaseLink} target="_blank" className="px-4 py-2 bg-white text-indigo-600 font-bold rounded-lg border border-indigo-200 shadow-sm hover:bg-indigo-50 flex items-center gap-2"><ExternalLink size={16}/> Comprar Directo</a>
                                )}
                                <button onClick={() => handleSendPurchaseRequest(item)} className="px-4 py-2 bg-white text-gray-700 font-bold rounded-lg border shadow-sm hover:bg-gray-50 flex items-center gap-2"><Mail size={16}/> Cotizar</button>
                                <button onClick={() => handleOrderStatusChange(item, 'ordered')} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg shadow-sm hover:bg-indigo-700 flex items-center gap-2"><Truck size={16}/> Marcar Pedido</button>
                              </div>
                            )}
                          </div>
                        ))}

                        {inventory.filter(i => i.orderStatus === 'ordered').map(item => (
                          <div key={item.id} className="flex justify-between items-center p-5 bg-indigo-50 border border-indigo-100 rounded-2xl opacity-80 hover:opacity-100 transition-opacity">
                            <div className="flex gap-4 items-center">
                              <div className="p-2 bg-indigo-200 text-indigo-700 rounded-full animate-bounce"><Truck size={20}/></div>
                              <div>
                                <h3 className="font-bold text-gray-900 text-lg flex items-center gap-2">{item.name} <span className="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded uppercase tracking-wider">Pedido Enviado</span></h3>
                                <p className="text-sm text-gray-600">Esperando recepción (Stock actual: {item.qty} {item.stockType === 'jar' ? '%' : item.unit})</p>
                              </div>
                            </div>
                            {isAdmin && (
                              <div className="flex gap-2">
                                <button onClick={() => handleOrderStatusChange(item, 'pending')} className="px-4 py-2 text-gray-500 hover:text-red-500 font-bold rounded-lg"><X size={20}/></button>
                                <button onClick={() => handleOrderStatusChange(item, 'received')} className="px-4 py-2 bg-green-600 text-white font-bold rounded-lg shadow-sm hover:bg-green-500 flex items-center gap-2"><CheckSquare size={16}/> ¡Recibido! (Sumar Stock)</button>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* --- MÓDULO INVENTARIO Y CATALOGO --- */}
              {activeTab === 'inventory' && !showItemForm && !selectedFolder && (
                <div className="space-y-6 animate-fade-in max-w-7xl mx-auto">
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="text-3xl font-extrabold text-gray-900 tracking-tight">Catálogo de Inventario</h2>
                    {isAdmin && (
                      <div className="flex gap-3">
                        <button onClick={handlePrintAllLabels} className="bg-purple-600 hover:bg-purple-700 text-white font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-transform hover:-translate-y-1">
                          <Printer size={18}/> Imprimir Catálogo de Etiquetas
                        </button>
                        <button onClick={handleExportCSV} className="bg-slate-800 hover:bg-slate-900 text-white font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-transform hover:-translate-y-1">
                          <Download size={18}/> Respaldar a Excel
                        </button>
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    {CATEGORIES.map(folder => {
                       const items = inventory.filter(i => i.category === folder.name);
                       const alerts = items.filter(i => i.qty < i.minThreshold).length;
                       return (
                        <div key={folder.id} onClick={() => setSelectedFolder(folder.name)} className="bg-white rounded-3xl p-6 shadow-sm border border-gray-200 cursor-pointer hover:shadow-xl hover:border-blue-400 transition-all group relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-transparent to-gray-50 rounded-bl-full -z-10 group-hover:to-blue-50 transition-colors"></div>
                          <div className="flex justify-between items-start mb-6">
                            <div className={`p-5 rounded-2xl text-4xl inline-block shadow-sm ${folder.color} group-hover:scale-110 transition-transform`}>{folder.icon}</div>
                            {alerts > 0 && <span className="bg-red-100 text-red-700 text-xs font-black px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm"><AlertTriangle size={14}/> {alerts} alertas</span>}
                          </div>
                          <h3 className="text-xl font-bold text-gray-800 mb-1">{folder.name}</h3>
                          <p className="text-gray-500 font-medium">{items.length} productos</p>
                        </div>
                       )
                    })}
                  </div>
                </div>
              )}

              {/* LISTA DE ITEMS DENTRO DE CARPETA */}
              {activeTab === 'inventory' && !showItemForm && selectedFolder && (
                 <div className="space-y-4 animate-fade-in max-w-7xl mx-auto flex flex-col h-full">
                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-2">
                      <h2 className="text-3xl font-extrabold text-gray-900 flex items-center gap-3">
                        <button onClick={()=>setSelectedFolder(null)} className="hover:bg-gray-200 p-2 rounded-full transition-colors"><ArrowLeft size={24}/></button> 
                        {selectedFolder}
                      </h2>
                      <div className="flex items-center gap-3">
                        <div className="flex bg-white rounded-xl border p-1 shadow-sm">
                          <button onClick={()=>setViewMode('table')} className={`p-2 rounded-lg ${viewMode==='table' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600'}`} title="Vista de Lista"><List size={20}/></button>
                          <button onClick={()=>setViewMode('grid')} className={`p-2 rounded-lg ${viewMode==='grid' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600'}`} title="Vista Galería"><LayoutGrid size={20}/></button>
                        </div>
                        {isAdmin && (
                          <button onClick={()=>{setEditingItem(null); setGeneratedQR(''); setShowItemForm(true);}} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-lg transition-transform hover:-translate-y-1">
                            <Plus size={20}/> Registrar Nuevo
                          </button>
                        )}
                      </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 mb-2 flex items-center gap-2">
                       <Search className="text-gray-400 ml-2" size={20} />
                       <input type="text" placeholder="Buscar por nombre, ID, lote, catálogo o marca..." className="w-full bg-transparent border-none focus:outline-none text-gray-700 font-medium" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>

                    {/* VISTA DE GRID */}
                    {viewMode === 'grid' && (
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 pb-20">
                        {inventory.filter(i => i.category === selectedFolder && (i.name.toLowerCase().includes(searchQuery.toLowerCase()) || i.barcode.includes(searchQuery) || i.lotNum?.includes(searchQuery) || i.catalogNum?.includes(searchQuery))).map(item => {
                          const isLow = item.qty < item.minThreshold;
                          return (
                            <div key={item.id} className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-xl transition-shadow flex flex-col">
                              <div className="h-40 bg-gray-100 relative">
                                {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-gray-300"><ImageIcon size={48}/></div>}
                                {isLow && <span className="absolute top-2 right-2 bg-red-500 text-white text-[10px] font-black uppercase px-2 py-1 rounded shadow-md">¡Reponer!</span>}
                              </div>
                              <div className="p-4 flex-1 flex flex-col">
                                <h3 className="font-bold text-gray-900 text-lg mb-1 line-clamp-2">{item.name}</h3>
                                <p className="text-xs text-gray-500 font-mono mb-1"><QrCode size={12} className="inline mr-1"/>{item.barcode}</p>
                                <p className="text-xs text-gray-500 mb-3">Lote: {item.lotNum || '--'} | Cat: {item.catalogNum || '--'}</p>
                                <div className="mt-auto pt-3 border-t border-gray-100 flex justify-between items-end">
                                  <div className="w-full">
                                    <p className="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Stock</p>
                                    {item.stockType === 'jar' ? (
                                       <div className="w-full bg-gray-200 rounded-full h-2 mb-1 mt-1 max-w-[120px]">
                                         <div className={`h-2 rounded-full ${isLow ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${Math.min(item.qty, 100)}%`}}></div>
                                       </div>
                                    ) : (
                                       <p className={`text-2xl font-black ${isLow ? 'text-red-600' : 'text-gray-800'}`}>{item.qty} <span className="text-sm font-medium text-gray-500">{item.unit}</span></p>
                                    )}
                                    {item.stockType === 'jar' && <p className={`text-sm font-black ${isLow ? 'text-red-600' : 'text-gray-800'}`}>{item.qty}%</p>}
                                  </div>
                                  <div className="flex gap-1 flex-shrink-0">
                                    <button onClick={()=>setViewingItem(item)} className="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100" title="Ver Detalles"><Info size={18}/></button>
                                    <button onClick={()=>{setScanInput(item.barcode); setActiveTab('scanner'); setTimeout(()=>handleBarcodeSubmit(),50)}} className="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100" title="Auditar"><ScanLine size={18}/></button>
                                    {isAdmin && <button onClick={()=>{setEditingItem(item); setGeneratedQR(item.barcode||''); setShowItemForm(true);}} className="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-200"><Settings size={18}/></button>}
                                    {SUPER_ADMIN_EMAILS.includes(currentUserData.email) && (
                                       <button onClick={()=>handleDeleteItem(item.id, item.name)} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100" title="Eliminar Base de Datos"><Trash2 size={18} /></button>
                                    )}
                                  </div>
                                </div>
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    )}

                    {/* VISTA DE TABLA */}
                    {viewMode === 'table' && (
                       <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex-1 overflow-x-auto pb-20">
                         <table className="w-full text-left whitespace-nowrap">
                           <thead className="bg-gray-50/80 sticky top-0 border-b border-gray-200">
                             <tr><th className="p-4 text-xs uppercase font-bold text-gray-500">Producto</th><th className="p-4 text-xs uppercase font-bold text-gray-500">Detalles</th><th className="p-4 text-xs uppercase font-bold text-gray-500 text-right">Stock</th><th className="p-4 text-xs uppercase font-bold text-gray-500 text-center">Acciones</th></tr>
                           </thead>
                           <tbody className="divide-y divide-gray-100">
                             {inventory.filter(i => i.category === selectedFolder && (i.name.toLowerCase().includes(searchQuery.toLowerCase()) || i.barcode.includes(searchQuery) || i.lotNum?.includes(searchQuery) || i.catalogNum?.includes(searchQuery))).map(item => {
                               const isLow = item.qty < item.minThreshold;
                               return (
                                 <tr key={item.id} className="hover:bg-blue-50/30">
                                   <td className="p-4 flex items-center gap-4 min-w-[250px]">
                                     <div className="w-12 h-12 rounded bg-gray-100 border border-gray-200 flex items-center justify-center overflow-hidden flex-shrink-0">
                                       {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover"/> : <ImageIcon className="text-gray-400" size={20}/>}
                                     </div>
                                     <div>
                                       <p className="font-bold text-gray-900">{item.name}</p>
                                       <p className="text-xs text-gray-500 font-mono"><QrCode size={12} className="inline mr-1"/>{item.barcode}</p>
                                     </div>
                                   </td>
                                   <td className="p-4 text-xs text-gray-600">
                                     <p className="mt-1">Lote: {item.lotNum || '--'} | Cat: {item.catalogNum || '--'}</p>
                                     {item.expirationDate && <p className="text-orange-600 mt-1 flex items-center gap-1 font-bold"><Calendar size={12}/> Vence: {item.expirationDate}</p>}
                                   </td>
                                   <td className="p-4 text-right">
                                     {item.stockType === 'jar' ? (
                                        <div className="w-full bg-gray-200 rounded-full h-2.5 max-w-[100px] ml-auto mb-1">
                                          <div className={`h-2.5 rounded-full ${isLow ? 'bg-red-500' : 'bg-blue-600'}`} style={{width: `${Math.min(item.qty, 100)}%`}}></div>
                                        </div>
                                     ) : null}
                                     <span className={`font-black text-xl ${isLow ? 'text-red-600' : 'text-gray-800'}`}>{item.qty} {item.stockType === 'jar' ? '%' : item.unit}</span>
                                   </td>
                                   <td className="p-4">
                                      <div className="flex justify-center gap-2">
                                        <button onClick={()=>setViewingItem(item)} className="text-emerald-600 bg-emerald-50 p-2.5 rounded-lg hover:bg-emerald-100" title="Ver Detalles"><Info size={18}/></button>
                                        <button onClick={()=>handlePrintLabel(item)} className="text-purple-600 bg-purple-50 p-2.5 rounded-lg hover:bg-purple-100" title="Imprimir"><Printer size={18}/></button>
                                        <button onClick={()=>{setScanInput(item.barcode); setActiveTab('scanner'); setTimeout(()=>handleBarcodeSubmit(),50)}} className="text-blue-600 bg-blue-50 p-2.5 rounded-lg hover:bg-blue-100" title="Auditar"><ScanLine size={18}/></button>
                                        {isAdmin && <button onClick={()=>{setEditingItem(item); setGeneratedQR(item.barcode || ''); setShowItemForm(true);}} className="text-gray-600 bg-gray-100 p-2.5 rounded-lg hover:bg-gray-200" title="Editar"><Settings size={18} /></button>}
                                        {SUPER_ADMIN_EMAILS.includes(currentUserData.email) && (
                                          <button onClick={()=>handleDeleteItem(item.id, item.name)} className="text-red-600 bg-red-50 p-2.5 rounded-lg hover:bg-red-100" title="Eliminar Base de Datos"><Trash2 size={18} /></button>
                                        )}
                                      </div>
                                   </td>
                                 </tr>
                               )
                             })}
                           </tbody>
                         </table>
                       </div>
                    )}

                    {/* === MODAL DE DETALLES DEL ITEM === */}
                    {viewingItem && (
                      <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 animate-fade-in overflow-y-auto">
                        <div className="bg-white rounded-3xl max-w-3xl w-full p-8 relative shadow-2xl my-auto">
                          <button onClick={() => setViewingItem(null)} className="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors"><X size={24}/></button>
                          
                          <div className="flex flex-col md:flex-row gap-6 mb-6">
                            <div className="w-full md:w-1/3 h-48 bg-gray-100 rounded-2xl flex items-center justify-center overflow-hidden border border-gray-200 shrink-0">
                              {viewingItem.imageUrl ? <img src={viewingItem.imageUrl} className="w-full h-full object-cover"/> : <ImageIcon size={64} className="text-gray-300"/>}
                            </div>
                            <div className="flex-1">
                              <h2 className="text-3xl font-black text-gray-900 mb-2">{viewingItem.name}</h2>
                              <p className="text-sm text-gray-500 font-mono bg-gray-100 px-3 py-1 rounded-lg inline-block border"><QrCode size={14} className="inline mr-2"/>{viewingItem.barcode}</p>
                              
                              <div className="mt-4 grid grid-cols-2 gap-4">
                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                  <p className="text-xs uppercase font-bold text-blue-500 mb-1">Stock Actual</p>
                                  <p className="text-2xl font-black text-blue-900">{viewingItem.qty} <span className="text-sm font-medium">{viewingItem.stockType === 'jar' ? '%' : viewingItem.unit}</span></p>
                                </div>
                                <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                  <p className="text-xs uppercase font-bold text-gray-500 mb-1">Stock Mínimo</p>
                                  <p className="text-2xl font-black text-gray-700">{viewingItem.minThreshold} <span className="text-sm font-medium">{viewingItem.stockType === 'jar' ? '%' : viewingItem.unit}</span></p>
                                </div>
                              </div>
                            </div>
                          </div>

                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4 border-t border-gray-100 pt-6">
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Categoría</p><p className="font-medium text-gray-900">{viewingItem.category}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Ubicación</p><p className="font-medium text-gray-900">{viewingItem.location}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Proveedor</p><p className="font-medium text-gray-900">{viewingItem.provider || '--'}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Marca</p><p className="font-medium text-gray-900">{viewingItem.brand || '--'}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Nº Catálogo</p><p className="font-medium text-gray-900">{viewingItem.catalogNum || '--'}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Nº Lote</p><p className="font-medium text-gray-900">{viewingItem.lotNum || '--'}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Caducidad</p><p className={`font-medium ${viewingItem.expirationDate && new Date(viewingItem.expirationDate) < new Date() ? 'text-red-600 font-bold' : 'text-gray-900'}`}>{viewingItem.expirationDate || '--'}</p></div>
                            <div><p className="text-xs font-bold text-gray-400 uppercase">Estado Pedido</p><p className="font-medium text-gray-900 uppercase">{viewingItem.orderStatus === 'ordered' ? '📦 En Camino' : (viewingItem.orderStatus === 'received' ? '✅ Recibido' : 'Normal')}</p></div>
                          </div>

                          {viewingItem.observations && (
                            <div className="mt-6 bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                              <p className="text-xs font-bold text-yellow-700 uppercase mb-1 flex items-center gap-1"><AlertTriangle size={14}/> Observaciones</p>
                              <p className="text-sm text-yellow-900">{viewingItem.observations}</p>
                            </div>
                          )}

                          {viewingItem.purchaseLink && (
                            <div className="mt-6 pt-6 border-t border-gray-100 text-center">
                              <a href={viewingItem.purchaseLink} target="_blank" className="inline-flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors">
                                <ExternalLink size={18}/> Ver Enlace de Compra
                              </a>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                 </div>
              )}

              {/* === FORMULARIO REGISTRO === */}
              {activeTab === 'inventory' && showItemForm && (
                <div className="bg-white p-8 rounded-3xl border border-gray-200 max-w-4xl mx-auto shadow-2xl animate-fade-in relative overflow-hidden pb-20">
                  <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                  
                  <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-6">
                    <div>
                      <h2 className="text-2xl font-black text-gray-900 flex items-center gap-3">
                        {editingItem ? <Settings className="text-blue-500" size={28}/> : <Plus className="text-green-500" size={28}/>} 
                        {editingItem ? 'Editar Ficha del Producto' : 'Registro de Nueva Ficha de Material'}
                      </h2>
                    </div>
                    <button onClick={()=>{setShowItemForm(false); setImagePreview(null);}} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X size={24} className="text-gray-400"/></button>
                  </div>

                  <form onSubmit={handleSaveItem} className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    
                    <div className="col-span-1 md:col-span-2">
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nombre del Producto / Reactivo *</label>
                      <input name="name" defaultValue={editingItem?.name} required className="w-full p-4 border border-gray-300 rounded-xl font-bold text-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" />
                    </div>

                    {/* IMAGEN DEL PRODUCTO */}
                    <div className="col-span-1 md:col-span-2 bg-slate-50 p-6 rounded-2xl border border-gray-200 shadow-inner">
                      <label className="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-4 flex items-center gap-2"><ImageIcon size={18}/> Fotografía del Producto</label>
                      <div className="flex flex-col sm:flex-row items-center gap-6">
                         <div className="w-32 h-32 rounded-xl bg-white border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                           {imagePreview ? <img src={imagePreview} className="w-full h-full object-cover" /> : <ImageIcon className="text-gray-300" size={40}/>}
                         </div>
                         <div className="flex-1 flex flex-col sm:flex-row gap-3 w-full">
                            <label className="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-xl text-center cursor-pointer transition-colors shadow-sm text-sm flex justify-center items-center gap-2">
                              <Upload size={18}/> Subir Archivo
                              <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                            </label>
                            <label className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl text-center cursor-pointer transition-colors shadow-sm text-sm flex justify-center items-center gap-2">
                              <Camera size={18}/> Tomar Foto
                              <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleImageUpload} />
                            </label>
                         </div>
                      </div>
                    </div>
                    
                    {/* ID UNIQUE */}
                    <div className="col-span-1 md:col-span-2 bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-inner mt-2">
                      <h3 className="text-sm font-bold text-white uppercase tracking-wider mb-3 flex items-center gap-2"><QrCode size={18} className="text-blue-400"/> Identificación LAB ID *</h3>
                      <div className="flex flex-wrap gap-3">
                        <input name="barcode" value={generatedQR} onChange={(e) => setGeneratedQR(e.target.value)} required placeholder="Escanea código original o genera uno..." className="flex-1 min-w-[200px] p-3.5 rounded-xl font-mono text-base outline-none" />
                        <button type="button" onClick={() => setCameraActiveForm(!cameraActiveForm)} className="bg-slate-700 text-white font-bold px-4 py-3 rounded-xl hover:bg-slate-600 transition-colors"><Camera size={20}/></button>
                        <button type="button" onClick={generateUniqueQR} className="bg-blue-600 text-white font-bold px-4 py-3 rounded-xl hover:bg-blue-500 transition-colors flex items-center gap-2"><QrCode size={18}/> Generar</button>
                      </div>
                      {cameraActiveForm && (
                        <div className="w-full max-w-sm mx-auto mt-4"><div id="qr-reader-form" className="rounded-xl overflow-hidden border-2 border-slate-500"></div></div>
                      )}
                    </div>

                    <div className="space-y-6 mt-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Categoría *</label>
                        <select name="category" defaultValue={editingItem?.category || selectedFolder} className="w-full p-3.5 border border-gray-300 rounded-xl font-medium outline-none">{CATEGORIES.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Ubicación Física *</label>
                        <input name="location" defaultValue={editingItem?.location} required placeholder="Ej. Estante A, Refri -20°C" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                      </div>
                    </div>

                    <div className="space-y-6 mt-4">
                      <div className="grid grid-cols-2 gap-4">
                         <div>
                           <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Proveedor</label>
                           <input name="provider" defaultValue={editingItem?.provider} placeholder="Ej. Thermo Fisher" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Marca</label>
                           <input name="brand" defaultValue={editingItem?.brand} placeholder="Ej. Invitrogen" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                         </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                         <div>
                           <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Nº de Catálogo</label>
                           <input name="catalogNum" defaultValue={editingItem?.catalogNum} placeholder="Ej. REF 12345" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Nº de Lote</label>
                           <input name="lotNum" defaultValue={editingItem?.lotNum} placeholder="Ej. LOT 987X" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                         </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-orange-600 uppercase mb-2 flex items-center gap-1"><Calendar size={14}/> Fecha de Caducidad</label>
                        <input type="date" name="expirationDate" defaultValue={editingItem?.expirationDate} className="w-full p-3.5 border border-orange-300 bg-orange-50/30 rounded-xl outline-none" />
                      </div>
                    </div>

                    <div className="col-span-1 md:col-span-2">
                      <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Observaciones / Notas de Seguridad</label>
                      <textarea name="observations" defaultValue={editingItem?.observations} placeholder="Condiciones especiales, notas de almacenamiento, sensibilidad, etc." rows="3" className="w-full p-3.5 border border-gray-300 rounded-xl outline-none"></textarea>
                    </div>

                    {/* --- Stock Engine Mejorado con Cambio Automático --- */}
                    <div className="col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-4 gap-6 pt-6 border-t border-gray-100">
                      <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2 text-center">Tipo de Stock</label>
                        <select name="stockType" value={formStockType} onChange={(e) => setFormStockType(e.target.value)} className="w-full p-3 border border-gray-300 rounded-xl font-bold text-base text-center outline-none bg-white">
                          <option value="unit">Unidades (Cerradas)</option>
                          <option value="jar">Frascos (Estimado %)</option>
                        </select>
                      </div>
                      <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2 text-center">Cantidad {formStockType === 'jar' && '(%)'} *</label>
                        <input type="number" name="qty" defaultValue={editingItem?.qty || 0} max={formStockType === 'jar' ? "100" : ""} required className="w-full p-3 border border-gray-300 rounded-xl font-black text-2xl text-center outline-none" />
                      </div>
                      <div className="bg-red-50 p-5 rounded-2xl border border-red-200">
                        <label className="block text-xs font-bold text-red-700 uppercase mb-2 text-center flex items-center justify-center gap-1"><AlertTriangle size={14}/> Alerta Mínima {formStockType === 'jar' && '(%)'} *</label>
                        <input type="number" name="minThreshold" defaultValue={editingItem?.minThreshold || 1} max={formStockType === 'jar' ? "100" : ""} required className="w-full p-3 border border-red-300 rounded-xl font-black text-2xl text-center text-red-700 outline-none bg-white" />
                      </div>
                      <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2 text-center">Unidad *</label>
                        <input name="unit" defaultValue={formStockType === 'jar' ? '%' : (editingItem?.unit || 'uds')} readOnly={formStockType === 'jar'} required placeholder="Ej. ml" className={`w-full p-3 border border-gray-300 rounded-xl font-bold text-lg text-center outline-none ${formStockType === 'jar' ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-white'}`} />
                      </div>
                    </div>
                    
                    {/* Link de Compra Directo */}
                    <div className="col-span-1 md:col-span-2">
                       <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Enlace Directo de Compra (URL)</label>
                       <input name="purchaseLink" defaultValue={editingItem?.purchaseLink} placeholder="https://tienda-proveedor.com/producto..." className="w-full p-3.5 border border-gray-300 rounded-xl outline-none" />
                    </div>

                    <div className="col-span-1 md:col-span-2 pt-6">
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl text-lg shadow-lg">Guardar Ficha en Base de Datos</button>
                    </div>
                  </form>
                </div>
              )}

              {/* === MÓDULO AUDITORÍA === */}
              {activeTab === 'scanner' && (
                <div className="max-w-6xl mx-auto space-y-8 animate-fade-in pb-10">
                  <div className="text-center mb-10">
                    <h2 className="text-4xl font-black text-gray-900">Terminal Segura de Auditoría</h2>
                    <p className="text-gray-500 mt-2 font-medium">Registra el consumo de forma estricta y auditable. Puedes usar tu lector USB y cámara al mismo tiempo.</p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    {/* PANEL IZQUIERDO: LECTURA SIMULTÁNEA */}
                    <div className="lg:col-span-5 bg-white rounded-3xl shadow-xl border border-gray-100 p-8 flex flex-col items-center h-fit">
                      <div className="w-full space-y-8">
                        
                        <div className="space-y-4">
                          <label className="text-sm font-bold text-gray-700 uppercase tracking-wider flex items-center gap-2"><Camera size={18} className="text-blue-600" /> Cámara del dispositivo</label>
                          {!cameraActive ? (
                            <button onClick={() => setCameraActive(true)} className="w-full py-6 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-bold flex flex-col items-center justify-center gap-2 shadow-lg transition-transform hover:scale-[1.02]">
                              <Camera size={36} className="text-blue-400" /> Activar Lector Óptico
                            </button>
                          ) : (
                            <div className="space-y-4 animate-fade-in">
                              <div id="qr-reader" className="shadow-inner bg-black rounded-2xl border-4 border-slate-800"></div>
                              <button onClick={() => setCameraActive(false)} className="w-full py-4 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl font-bold flex justify-center gap-2 transition-colors"><X size={20} /> Detener Cámara</button>
                            </div>
                          )}
                        </div>
                        
                        <div className="relative flex items-center py-2"><div className="flex-grow border-t border-gray-200"></div><span className="flex-shrink-0 mx-4 text-blue-600 font-black text-sm uppercase tracking-widest">+ Y/Ó AL MISMO TIEMPO +</span><div className="flex-grow border-t border-gray-200"></div></div>
                        
                        <form onSubmit={handleBarcodeSubmit} className="relative bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 shadow-inner">
                          <label className="text-sm font-black text-blue-800 uppercase tracking-wider flex items-center gap-2 mb-4"><Keyboard size={18} /> Pistola / Escáner USB</label>
                          <div className="relative">
                            <ScanLine className="absolute left-4 top-1/2 transform -translate-y-1/2 text-blue-600" size={24} />
                            <input ref={scannerInputRef} type="text" value={scanInput} onChange={(e)=>setScanInput(e.target.value)} placeholder="Dispara el lector aquí..." className="w-full pl-14 pr-4 py-5 bg-white border-2 border-blue-300 rounded-xl focus:border-blue-600 outline-none font-mono text-base shadow-sm" autoFocus />
                          </div>
                          <button type="submit" className="hidden"></button>
                        </form>

                      </div>
                    </div>

                    {/* PANEL DERECHO: ACCIÓN */}
                    <div className="lg:col-span-7 bg-white rounded-3xl shadow-xl border border-gray-100 p-8 flex flex-col min-h-[500px]">
                      <h3 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 border-b border-gray-100 pb-4">Ficha Técnica y Operaciones</h3>
                      
                      {!scannedItem ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-gray-300 space-y-6 bg-slate-50/50 rounded-2xl border-2 border-dashed border-gray-200 p-10">
                          <PackageSearch size={80} className="text-gray-300 animate-pulse" />
                          <p className="font-bold text-xl text-gray-400 text-center">Esperando Lectura</p>
                        </div>
                      ) : (
                        <div className="flex-1 flex flex-col animate-fade-in h-full justify-between">
                          <div>
                            <div className="flex items-start justify-between mb-4">
                              <div>
                                <h4 className="text-3xl font-black text-gray-900 leading-tight mb-2">{scannedItem.name}</h4>
                                <div className="flex flex-wrap items-center gap-2">
                                  <p className="text-sm font-mono text-gray-600 bg-gray-100 px-2 py-1 rounded border"><QrCode size={14} className="inline mr-1"/>{scannedItem.barcode}</p>
                                </div>
                              </div>
