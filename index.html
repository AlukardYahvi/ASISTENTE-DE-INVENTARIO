                              {scannedItem.imageUrl && <img src={scannedItem.imageUrl} className="w-24 h-24 rounded-xl object-cover border-2 border-gray-200 shadow-sm shrink-0" />}
                            </div>

                            <div className="bg-gray-50 rounded-2xl p-5 mb-4 text-sm border border-gray-200 grid grid-cols-2 gap-y-4 gap-x-4">
                              <div><p className="text-xs text-gray-500 uppercase font-bold tracking-wider">Catálogo</p><p className="font-medium text-gray-900">{scannedItem.catalogNum || '--'}</p></div>
                              <div><p className="text-xs text-gray-500 uppercase font-bold tracking-wider">Lote</p><p className="font-medium text-gray-900">{scannedItem.lotNum || '--'}</p></div>
                              <div><p className="text-xs text-gray-500 uppercase font-bold tracking-wider">Marca</p><p className="font-medium text-gray-900">{scannedItem.brand || '--'}</p></div>
                              <div><p className="text-xs text-gray-500 uppercase font-bold tracking-wider">Proveedor</p><p className="font-medium text-gray-900">{scannedItem.provider || '--'}</p></div>
                              
                              <div className="col-span-2 border-t border-gray-200 pt-3 flex justify-between items-center">
                                <div>
                                  <p className="text-xs text-gray-500 uppercase font-bold tracking-wider flex items-center gap-1"><Calendar size={12}/> Vencimiento</p>
                                  <p className={`font-bold mt-1 ${!scannedItem.expirationDate ? 'text-gray-600' : new Date(scannedItem.expirationDate) < new Date() ? 'text-red-600 text-base' : 'text-gray-900'}`}>
                                    {scannedItem.expirationDate || 'N/A'} {scannedItem.expirationDate && new Date(scannedItem.expirationDate) < new Date() && ' (¡VENCIDO!)'}
                                  </p>
                                </div>
                                <div className="text-right">
                                   <p className="text-xs text-gray-500 uppercase font-bold tracking-wider flex items-center justify-end gap-1"><MapPin size={12}/> Ubicación</p>
                                   <p className="font-black text-gray-900 mt-1">{scannedItem.location}</p>
                                </div>
                              </div>
                            </div>

                            {scannedItem.observations && (
                              <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-xl mb-4">
                                <p className="text-xs text-yellow-800 uppercase font-bold tracking-wider mb-1 flex items-center gap-1"><AlertTriangle size={14}/> Observaciones de la Ficha</p>
                                <p className="text-sm text-yellow-900 font-medium">{scannedItem.observations}</p>
                              </div>
                            )}

                            <div className="bg-blue-600 text-white rounded-2xl p-6 mb-4 flex justify-between items-center shadow-lg">
                              <div className="w-full">
                                <p className="text-xs uppercase font-bold tracking-widest text-blue-200 mb-1">Inventario Actual</p>
                                {scannedItem.stockType === 'jar' ? (
                                   <div className="w-full bg-blue-800 rounded-full h-4 mb-2 mt-2">
                                     <div className={`h-4 rounded-full ${scannedItem.qty < scannedItem.minThreshold ? 'bg-red-400' : 'bg-green-400'}`} style={{width: `${Math.min(scannedItem.qty, 100)}%`}}></div>
                                   </div>
                                ) : null}
                                <div className="flex items-baseline gap-2">
                                  <p className="text-6xl font-black">{scannedItem.qty}</p>
                                  <p className="text-2xl font-medium text-blue-200">{scannedItem.stockType === 'jar' ? '%' : scannedItem.unit}</p>
                                </div>
                              </div>
                            </div>
                            
                            {/* --- EN LA FICHA DE ESCÁNER (Botón de Compra Directa) --- */}
                            {scannedItem.purchaseLink && (
                              <a href={scannedItem.purchaseLink} target="_blank" className="block w-full text-center py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 mb-4 shadow-md transition-transform hover:-translate-y-1">
                                🛒 Comprar / Reabastecer Reactivo
                              </a>
                            )}
                          </div>
                          
                          <div className="space-y-4 bg-gray-50 p-5 rounded-2xl border border-gray-200 mt-4">
                            <div className="flex bg-white p-1 rounded-xl shadow-sm border border-gray-200">
                              <button onClick={() => setScanAction('info')} className={`flex-1 py-3 text-sm font-black uppercase tracking-wider rounded-lg ${scanAction === 'info' ? 'bg-slate-800 text-white' : 'text-gray-500'}`}>Solo Auditoría</button>
                              <button onClick={() => setScanAction('remove')} className={`flex-1 py-3 text-sm font-black uppercase tracking-wider rounded-lg ${scanAction === 'remove' ? 'bg-orange-500 text-white' : 'text-gray-500'}`}>Consumir</button>
                              {isAdmin && <button onClick={() => setScanAction('add')} className={`flex-1 py-3 text-sm font-black uppercase tracking-wider rounded-lg ${scanAction === 'add' ? 'bg-green-500 text-white' : 'text-gray-500'}`}>Ingresar</button>}
                            </div>
                            
                            {scanAction !== 'info' && (
                              <div className="animate-fade-in space-y-4 pt-2">
                                {scanAction === 'remove' && (
                                  <div>
                                    <label className="block text-xs font-bold text-gray-600 uppercase mb-2">Motivo de Retiro *</label>
                                    <select value={scanReason} onChange={e => setScanReason(e.target.value)} className="w-full p-3 rounded-xl border border-gray-300 font-medium outline-none focus:border-orange-500 bg-white">
                                      <option value="Protocolo rutinario">Protocolo rutinario</option>
                                      <option value="Muestra desperdiciada / Error">Muestra desperdiciada / Error</option>
                                      <option value="Calibración de equipo">Calibración de equipo</option>
                                      <option value="Limpieza o Mantenimiento">Limpieza o Mantenimiento</option>
                                      <option value="Caducado / Contaminado">Caducado / Contaminado (Merma)</option>
                                    </select>
                                  </div>
                                )}
                                
                                <div className="flex flex-col sm:flex-row gap-4">
                                  <div className="flex items-center border-2 border-gray-300 rounded-xl bg-white shadow-inner sm:w-40 w-full">
                                    <button type="button" onClick={() => setScanAmount(Math.max(1, scanAmount - 1))} className="p-4 text-gray-600 rounded-l-xl hover:bg-gray-100"><Minus size={20}/></button>
                                    <input type="number" min="1" max={scannedItem.stockType === 'jar' ? "100" : ""} value={scanAmount} onChange={(e) => setScanAmount(parseInt(e.target.value) || 1)} className="w-full text-center font-black text-2xl outline-none"/>
                                    <button type="button" onClick={() => setScanAmount(scanAmount + 1)} className="p-4 text-gray-600 rounded-r-xl hover:bg-gray-100"><Plus size={20}/></button>
                                  </div>
                                  <button id="btn-action-success" onClick={executeScanAction} className={`flex-1 py-4 rounded-xl font-black text-white text-lg uppercase tracking-wider shadow-xl ${scanAction === 'add' ? 'bg-green-600 hover:bg-green-500' : 'bg-orange-600 hover:bg-orange-500'} transition-transform hover:-translate-y-1`}>
                                    {scanAction === 'add' ? 'Confirmar Ingreso' : 'Registrar Retiro'}
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* === MÓDULO HISTORIAL === */}
              {activeTab === 'history' && isAdmin && (
                <div className="max-w-7xl mx-auto animate-fade-in space-y-6">
                  <div className="flex items-center gap-4 mb-6">
                     <div className="bg-slate-800 p-4 rounded-2xl text-white shadow-lg"><ClipboardSignature size={32}/></div>
                     <div>
                       <h2 className="text-3xl font-black text-gray-900 tracking-tight">Historial Operativo</h2>
                       <p className="text-gray-500 font-medium">Registro inmutable de movimientos en el inventario.</p>
                     </div>
                  </div>
                  
                  <div className="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left whitespace-nowrap">
                        <thead className="bg-slate-50 border-b border-gray-200">
                          <tr>
                            <th className="p-5 text-xs font-bold text-gray-500 uppercase tracking-wider">Fecha / Hora</th>
                            <th className="p-5 text-xs font-bold text-gray-500 uppercase tracking-wider">Usuario</th>
                            <th className="p-5 text-xs font-bold text-gray-500 uppercase tracking-wider text-center">Operación</th>
                            <th className="p-5 text-xs font-bold text-gray-500 uppercase tracking-wider">Reactivo / Equipo</th>
                            <th className="p-5 text-xs font-bold text-gray-500 uppercase tracking-wider">Motivo Declarado</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {logs.slice(0, 150).map(log => (
                            <tr key={log.id} className="hover:bg-slate-50 transition-colors">
                              <td className="p-5"><p className="font-bold text-gray-800">{new Date(log.timestamp).toLocaleDateString()}</p><p className="text-xs text-gray-500 font-mono">{new Date(log.timestamp).toLocaleTimeString()}</p></td>
                              <td className="p-5"><p className="font-bold text-gray-900 flex items-center gap-2"><User size={14} className="text-blue-500"/> {log.userName}</p><p className="text-xs text-gray-400">{log.userEmail}</p></td>
                              <td className="p-5 text-center">
                                <span className={`px-4 py-1.5 rounded-full text-[10px] uppercase font-black tracking-wider ${log.action === 'add' ? 'bg-green-100 text-green-700' : log.action === 'remove' ? 'bg-orange-100 text-orange-700' : log.action === 'create' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}>
                                  {log.action === 'add' ? '+ INGRESO' : log.action === 'remove' ? '- CONSUMO' : log.action === 'create' ? 'CREACIÓN' : 'ELIMINADO'} {log.amount > 0 ? `(${log.amount})` : ''}
                                </span>
                              </td>
                              <td className="p-5 font-bold text-gray-800">{log.itemName}</td>
                              <td className="p-5 text-sm font-medium text-gray-600 italic">"{log.reason || 'N/A'}"</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* === MÓDULO USUARIOS === */}
              {activeTab === 'users' && currentUserData.role === 'superadmin' && (
                <div className="max-w-5xl mx-auto animate-fade-in space-y-6">
                  <div className="flex items-center gap-4 mb-6">
                     <div className="bg-purple-700 p-4 rounded-2xl text-white shadow-lg"><ShieldAlert size={32}/></div>
                     <div><h2 className="text-3xl font-black text-gray-900">Panel de Seguridad</h2><p className="text-gray-500">Gestiona roles de los técnicos.</p></div>
                  </div>
                  <div className="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">
                    <table className="w-full text-left">
                      <thead className="bg-gray-50 border-b border-gray-200"><tr><th className="p-6 text-xs font-bold text-gray-500 uppercase">Identidad</th><th className="p-6 text-xs font-bold text-gray-500 uppercase">Privilegios</th></tr></thead>
                      <tbody className="divide-y divide-gray-100">
                        {allUsers.map(u => (
                          <tr key={u.uid}>
                            <td className="p-6 flex items-center gap-4">
                              <div className="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-500 overflow-hidden">{u.photoURL ? <img src={u.photoURL}/> : <User size={20}/>}</div>
                              <div><p className="font-bold text-gray-900">{u.name}</p><p className="text-xs text-gray-500 font-mono">{u.email}</p></div>
                            </td>
                            <td className="p-6">
                              {SUPER_ADMIN_EMAILS.includes(u.email) ? (
                                <span className="bg-purple-600 text-white px-4 py-2 rounded-lg text-xs font-black uppercase"><ShieldCheck size={14} className="inline mr-1"/> Propietario</span>
                              ) : (
                                <select value={u.role || 'user'} onChange={(e)=>handleUpdateUserRole(u.uid, e.target.value)} className="p-3 border rounded-xl font-bold text-sm outline-none bg-white">
                                  <option value="user">Usuario (Solo Consumir)</option><option value="admin">Administrador (Ingresos/CRUD)</option>
                                </select>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<LabInventoryApp />);
  </script>
</body>
</html>
